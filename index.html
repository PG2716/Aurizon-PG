<script>

var CATS = [{"id": "signals", "name": "Signals & signs", "color": "#5C6BC0", "bg": "#F3F4FF", "tc": "#3949AB", "sc": "#5C6BC0"}, {"id": "brakes", "name": "Brake & air systems", "color": "#546E7A", "bg": "#F0F4F5", "tc": "#37474F", "sc": "#546E7A"}, {"id": "ecp", "name": "ECP & distributed power", "color": "#607D8B", "bg": "#F1F4F5", "tc": "#455A64", "sc": "#607D8B"}, {"id": "emergency", "name": "Emergency procedures", "color": "#B0625E", "bg": "#FBF2F2", "tc": "#7B3C39", "sc": "#B0625E"}, {"id": "defects", "name": "Defects & restrictions", "color": "#7E7E9A", "bg": "#F4F4F9", "tc": "#4A4A6A", "sc": "#7E7E9A"}, {"id": "route", "name": "Route & grades", "color": "#5D8A6E", "bg": "#F1F7F4", "tc": "#3A6050", "sc": "#5D8A6E"}, {"id": "otherlines", "name": "Other routes", "color": "#5B8FA8", "bg": "#F0F6F9", "tc": "#376277", "sc": "#5B8FA8"}, {"id": "mines", "name": "Mine & terminal ops", "color": "#8A7560", "bg": "#F7F4F0", "tc": "#5C4E3A", "sc": "#8A7560"}, {"id": "ptwaratah", "name": "Pt Waratah / Kooragang", "color": "#5F8877", "bg": "#F0F6F3", "tc": "#3D6355", "sc": "#5F8877"}, {"id": "locos", "name": "Locomotive types", "color": "#78909C", "bg": "#F2F5F7", "tc": "#546E7A", "sc": "#78909C"}, {"id": "contacts", "name": "Contacts & references", "color": "#6D9B8B", "bg": "#F1F7F5", "tc": "#456E5E", "sc": "#6D9B8B"}, {"id": "rules", "name": "ARTC rules (ANGE)", "color": "#8D7B6E", "bg": "#F6F3F1", "tc": "#5C4E44", "sc": "#8D7B6E"}, {"id": "procedures", "name": "Driving procedures", "color": "#6B7B8D", "bg": "#F2F4F6", "tc": "#445566", "sc": "#6B7B8D"},{"id":"workontrack","name":"Work on Track (ANWT)","color":"#6D4C41","bg":"#FBF5F2","tc":"#4E342E","sc":"#6D4C41"},{"id":"safeworking","name":"Safeworking Systems (ANSY)","color":"#37474F","bg":"#F0F4F5","tc":"#263238","sc":"#37474F"},{"id":"forms","name":"Safeworking Forms (ANRF)","color":"#4A5568","bg":"#F2F4F7","tc":"#2D3748","sc":"#4A5568"},{"id":"nibs","name":"Network Information Books","color":"#2E7D32","bg":"#F1F8F1","tc":"#1B5E20","sc":"#2E7D32"}];
var DB = {"signals":[{"name":"Signal prefix reference \u2014 Hunter Valley & Newcastle","type":"field","source":"ARTC NSW Network","sections":[{"t":"table","title":"Main North \u2014 signal prefixes","headers":["Prefix","Location","Controller"],"rows":[["M / C","Waratah / Warabrook / Sandgate","Port Waratah Control \u2192 Lower Hunter Control"],["HJ","Hexham Junction","Lower Hunter Control"],["TN","Thornton / Beresfield","Lower Hunter Control"],["MT","Metford / Telarah (automatic)","Lower Hunter Control"],["MD","Maitland","Lower Hunter Control / Middle Hunter Control"],["D / U","Lochinvar to Allandale area (automatic)","Middle Hunter Control"],["AE","Allandale","Middle Hunter Control"],["BN","Branxton / Greta / Cessnock Road","Middle Hunter Control"],["MH","Minimbah (automatic)","Middle Hunter Control"],["WM","Whittingham","Middle Hunter Control"],["146.9 \u2013 150.4","Singleton","Middle Hunter Control"],["CL","Camberwell Junction","Upper Hunter 1"],["MN","Mt Owen Junction / Ashton Coal","Upper Hunter 1"],["NJ","Ravensworth / Newdell Junction","Upper Hunter 1"],["DJ","Drayton Junction / Antiene","Upper Hunter 1"],["MK","Muswellbrook / Koolbury / Dartbrook","Upper Hunter 1"],["03","Aberdeen","Upper Hunter 2"]]},{"t":"table","title":"Newcastle terminals","headers":["Prefix","Location","Controller"],"rows":[["PW / C","Port Waratah (PWCS)","Port Waratah Control"],["NF / SF","Kooragang Island (NCIG)","Port Waratah Control / Lower Hunter"],["C (104\u2013106)","Warabrook / Hanbury Junction","Port Waratah Control"],["HJ (DC/UC)","Hexham coal roads","Lower Hunter Control"]]},{"t":"table","title":"Eraring & Lake Macquarie","headers":["Prefix","Location","Controller"],"rows":[["SJ","Sulphide Junction","Lower Hunter Control"],["S","Cardiff / Cockle Creek area","Lower Hunter Control"],["E","Eraring terminal","Lower Hunter Control"]]},{"t":"table","title":"Pass at stop \u2014 quick reference","headers":["Signal type","Authority required"],"rows":[["Absolute \u2014 Home / Outer Home / Starting","Verbal authority from controller. Home signals: also confirm points set"],["SPA signals","Special Proceed Authority issued by controller"],["Automatic (permissive)","Pass under ANSG 608. Driver judges it safe. Travel at restricted speed"]]}]},{"name":"ANSG 600 \u2014 Running signals","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG-600.pdf","version":"3.0","sections":[{"t":"text","title":"Purpose","content":"Describes running signals used in the ARTC NSW Network. Must be passed only per ANSG 606 and ANSG 608."},{"t":"table","title":"Signal designations","headers":["Designation","Description"],"rows":[["Outer Home / Accept","Controlled. Controls entry to block ahead. Does not protect points"],["Home","Controlled. Protects points and identified risks. Some kept permanently at STOP"],["Starting","Controlled. Authorises departure from a controlled area"],["Home/Starting","Controlled. Functions as both home and starting signal"],["Distant (Controlled)","Usually shows CLEAR or CAUTION only"],["Automatic","Permissive. Shows PROCEED only if block ahead is unoccupied"]]},{"t":"text","title":"Controlled vs automatic","content":"Staggered lamp cases = automatic. Vertical in-line = controlled (unless A sign fitted).\nA light lit or A sign on or near a signal = operates automatically.\nLower quadrant semaphore signals are ALWAYS controlled."},{"t":"text","title":"Repeater signals","content":"LED repeater: 4 white lights \u2014 horizontal = next signal STOP, angled = PROCEED.\nPosition light repeater: 2 white lights, same pattern.\nBanner repeater: fishtail bar \u2014 horizontal = STOP, rotated = PROCEED."},{"t":"note","content":"Lower turnout units: PROCEED for a turnout = diagonal row of yellow lights angled up towards the turnout."}]},{"name":"ANSG 602 \u2014 Shunting signals","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG-602.pdf","version":"2.0","sections":[{"t":"text","title":"Purpose","content":"Shunting signals are controlled signals used to authorise shunting movements. Must be passed only per ANSG 606."},{"t":"table","title":"Types of shunting signals","headers":["Type","Description"],"rows":[["Calling on signal","Subsidiary to home signals. Points LOCKED but line ahead NOT guaranteed clear"],["Shunt ahead signal","Subsidiary to starting/home-starting signals. NOT authority to proceed through a section"],["Intermediate shunting","Between two running signals. Shows PROCEED for running movement when first signal is clear"],["Dead end signal","Authorises movement from running line to a dead end siding"],["Wrong road signal","Authorises shunting in the wrong running-direction to limit of authority"],["Shunt repeater","SHUNT REPEATER sign. Shows shunting signal below NEXT running signal displays PROCEED"]]},{"t":"caut","content":"A calling on signal does NOT confirm the line ahead is clear. Proceed at restricted speed prepared to stop."}]},{"name":"ANSG 604 \u2014 Indicators and signs","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG_604_I5_Rev_2.pdf","version":"5.2","sections":[{"t":"table","title":"Main line indicator indications","headers":["Indication","Meaning"],"rows":[["Pulsating white","Points set for main line AND level crossing warning equipment working"],["Steady yellow","Points set for main line. Next indicator may be at STOP"],["Steady red","STOP"],["Steady red + angled white lights","Points set for the turnout"]]},{"t":"table","title":"Point indicators","headers":["Indication","Meaning"],"rows":[["Red light","Points NOT set"],["White arrow","Points set and locked for route shown"],["Mechanical bar horizontal","Points unlocked or not in NORMAL position"],["Mechanical bar angled 45\u00b0","Points set and locked in NORMAL position"]]},{"t":"table","title":"Point setting indicators (reflectorised targets)","headers":["Target","Meaning"],"rows":[["Green arrow","Main line points set for main line"],["Yellow dumb bell","Main line points set for crossing loop or branch"],["Red dumb bell","Main line points set for siding or dead end"],["Yellow circle","Crossing loop points set for loop, or yard points set straight"],["White square","Crossing loop points set for siding, or yard points set for turnout"]]},{"t":"table","title":"Key trackside signs","headers":["Sign","Meaning"],"rows":[["YARD LIMIT","Defines limits of a yard and end of section"],["SHUNT LIMIT (white on red)","Limit of shunting movement on running line"],["STOP (white on red)","May only be passed if authorised"],["TONNAGE sign","Absolute signal for prescribed trains before a rising grade"],["WHISTLE sign","Drivers must sound the whistle"]]}]},{"name":"ANSG 606 \u2014 Responding to signals and signs","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG-606.pdf","version":"4.0","sections":[{"t":"table","title":"Running signal indications","headers":["Indication","Meaning","Required action"],"rows":[["CLEAR","Next signal shows PROCEED","Proceed at normal speed"],["MEDIUM","Next signal at least CAUTION","Proceed, prepare for CAUTION ahead"],["CAUTION","Next signal may be at STOP","Proceed, prepare to stop at next signal"],["LOW SPEED","Next signal may be at STOP","Proceed \u2014 max 25 km/h where train stops fitted"],["CLOSE UP","Next signal may be at STOP","Proceed, be ready to stop at next signal"],["STOP","\u2014","Stop before the signal"]]},{"t":"caut","content":"A fixed signal indication must be treated as STOP if it is an illegal indication, there is no indication, or the indication is not understood."}]},{"name":"ANSG 608 \u2014 Passing signals at STOP","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG_608_I3_Rev_1.pdf","version":"3.1","sections":[{"t":"text","title":"Absolute signals","content":"Rail traffic must NOT pass an absolute signal at STOP unless authorised by the Signaller, by a Handsignaller, or under a method of special working."},{"t":"text","title":"Permissive signals","content":"Rail traffic MAY pass a permissive signal at STOP if the Signaller does not instruct the Driver to remain standing, and the Driver considers it safe. Must travel at restricted speed prepared to stop."},{"t":"steps","title":"Absolute signal at STOP \u2014 required actions","items":["Attempt to speak to the Signaller if the signal does not clear in expected time","Give the Signaller your train number","Give the Signaller the signal number or designation","Wait for the Signaller's authority before proceeding","Record in permanent form: time and signal number passed at STOP"]}]},{"name":"ANSG 610 \u2014 Passing indicators at STOP","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG_610_I2_Rev_1.pdf","version":"2.1","sections":[{"t":"text","title":"Principle","content":"Must NOT pass main line indicators or point indicators at STOP unless:\n\u2022 Points have been checked and set for the route, AND\n\u2022 If necessary, the points have been clipped and locked"},{"t":"text","title":"Level crossing indicators","content":"Must NOT pass at STOP a main line indicator protecting a level crossing unless the level crossing warning equipment is working correctly, or per ANGE 218."}]},{"name":"ANSG 612 \u2014 Overrun of limit of authority","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG-612.pdf","version":"2.0","sections":[{"t":"text","title":"What is an overrun","content":"A movement overruns its limit of authority if, without authority, it:\n\u2022 Passes a signal at STOP\n\u2022 Passes a sign showing a limit of authority\n\u2022 Exceeds the limit of a Train Order or SPA\n\u2022 Enters a block without the correct authority"},{"t":"steps","title":"Driver actions \u2014 immediately after overrun","items":["Stop the train immediately","Tell the Network Control Officer","Wait for the NCO's further instructions","Do not continue until the movement is authorised by the NCO"]},{"t":"caut","content":"Do not attempt to reverse or continue without NCO authorisation. Any overrun must be reported immediately."}]},{"name":"ANSG 614 \u2014 Blocking facilities","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG-614.pdf","version":"2.0","sections":[{"t":"text","title":"What are blocking facilities","content":"Devices used to prevent unintended issue of Proceed Authorities or unintended operation of signalling or point equipment."},{"t":"warn","content":"Do not assume signals have been set at STOP, points correctly set, or blocking facilities applied \u2014 unless assured by the NCO."},{"t":"note","content":"As a driver: if told a section is blocked, wait for NCO authorisation before entering."}]},{"name":"ANSG 616 \u2014 Precautions during signal testing","type":"artc","source":"ARTC NSW Signals and Signs","url":"https://www.artc.com.au/uploads/ANSG-616.pdf","version":"2.0","sections":[{"t":"note","content":"As a driver: if advised that signal testing is in progress, treat all signals with extra caution and be prepared to stop at any signal displaying unusual indications. Report any abnormal signal behaviour to the NCO immediately."}]}],"brakes":[{"name":"Locomotive functionality test \u2014 all classes","type":"field","source":"Aurizon procedure","sections":[{"t":"note","content":"Green text in the original = what you should OBSERVE. Orange text = the secondary check being verified by that step. Both are included in each step below."},{"t":"steps","title":"Locomotive functionality test procedure","items":["Ensure the locomotive is secure \u2014 PARK BRAKE APPLIED & CHOCKED","Observe main reservoir pressure \u2014 MR should indicate 750 to 850 kPa","Apply independent brake and cut-in \u2014 BRAKE CYLINDER PRESSURE RISES","Cut-in feed valve and release automatic brake \u2014 BRAKE PIPE & EQUALISING RESERVOIR PRESSURE RISES TO 500 kPa","Release independent \u2014 OBSERVE BC PRESSURE FALLS TO ZERO\n Also checks: No.\u202f3 pipe is clear and operation of the J1 relay valve","Apply a minimum automatic brake application \u2014 OBSERVE BP & ER FALLS BY 50 kPa AND INDEPENDENT RISES TO APPROXIMATELY 130 kPa","Bail off the independent \u2014 OBSERVE BC PRESSURE FALLS TO ZERO\n Also checks: No.\u202f4 pipe is clear","Apply a further automatic brake application to approximately 100 kPa and isolate the feed valve \u2014 WAIT 1 MINUTE. BP pressure must not exceed 18 kPa leakage (light engine)","Cut-in automatic brake","Select dynamic brake \u2014 DYNAMIC BRAKE INTERLOCK ENERGISES AND BC PRESSURE FALLS TO ZERO","Apply and release the independent brake over dynamic brake \u2014 OBSERVE: dynamic brake cancels when BC pressure rises above approximately 120 kPa and REACTIVATES when independent brake is released","Slightly open the emergency cock to create an air leak \u2014 OBSERVE BP PRESSURE MAINTAINS AT 350 kPa\n Tests the self-maintaining feature","Apply an emergency automatic brake application \u2014 OBSERVE: BP and ER falls rapidly to ZERO, BC rises to approximately 350 kPa. Emergency function overrides the DB interlock. PCS/PKS energises and ALL tractive effort is removed","Reset the emergency automatic brake application and recharge the BP \u2014 OBSERVE BP AND ER PRESSURE RISES TO 500 kPa","Check the operation of the in-cab emergency cocks","Allow the vigilance to time out \u2014 OBSERVE: visual and audible warning indications, then emergency automatic brake applies. BP and ER rapidly fall to ZERO. Independent pressure rises to approximately 350 kPa","Reset penalty application, fully apply the independent brake and conduct a direction, power and sand test \u2014 OBSERVE: rise of effort/amps and the sand indicator\n Tests that the sands are operational, the locomotive is powering, and all safety features have been correctly reset"]},{"t":"table","title":"Key gauge readings \u2014 quick reference","headers":["Gauge","Normal range","What to watch"],"rows":[["Main Reservoir (MR)","750\u2013850 kPa","Check before starting test"],["Brake Pipe (BP)","500 kPa (charged)","Falls rapidly to 0 on emergency"],["Equalising Reservoir (ER)","500 kPa (charged)","Tracks BP \u2014 both fall together on emergency"],["Brake Cylinder (BC)","0 kPa (released)","Rises to ~350 kPa on emergency. Falls to 0 when independent released"],["Independent (BC over independent)","~560 kPa (fully applied)","Falls to 0 when independent released (do not depress handle)"],["Leakage (light engine)","Max 18 kPa/min","Measured with feed valve isolated and auto brake at ~100 kPa"]]},{"t":"note","content":"This test applies to all classes. For class-specific differences (5000 vs 5020/5040 dynamic brake interlock behaviour) refer to the 5000/5020/6000 Brake Valve Test procedure in this category."}]},{"name":"Brake holding test times \u2014 GRAIN trains (AGUY / AGAH)","type":"field","source":"ARTC TOC Manual \u2014 grain consists","sections":[{"t":"warn","content":"This holding test table applies to GRAIN trains (AGUY / AGAH wagons) only. For ECP coal train holding test times refer to the ECP interim brake retention test procedure."},{"t":"table","title":"Holding test times by train length","headers":["Train length (m)","Holding time (min)"],"rows":[["0 \u2013 100","13"],["101 \u2013 200","16"],["201 \u2013 300","19"],["301 \u2013 400","22"],["401 \u2013 500","25"],["501 \u2013 600","28"],["601 \u2013 700","31"],["701 \u2013 800","34"],["801 \u2013 900","37"],["901 \u2013 1,000","40"],["1,001 \u2013 1,100","43"],["1,101 \u2013 1,200","46"],["1,201 \u2013 1,300","49"],["1,301 \u2013 1,400","52"],["1,401 \u2013 1,500","55"],["1,501 \u2013 1,600","58"],["1,601 \u2013 1,700","61"],["1,701 \u2013 1,800","64"],["1,801 \u2013 1,900","67"],["1,901 \u2013 2,000","70"]]},{"t":"note","content":"Over 2,000 m \u2014 70 minutes plus 3 minutes for every additional 100 m of brake pipe length."},{"t":"text","title":"Articulated and multi-platform wagons","content":"If an articulated wagon with a conventional braking system is marshalled at the rear of a freight train, the Brake Holding Test is to be carried out by observing that the last three control valves are operational."},{"t":"text","title":"Number of inoperative air brakes","content":"On freight trains, one wagon (or equivalent) in ten may have an inoperative or isolated air brake, provided that the total unbraked mass does not exceed 10% of the total train mass (excluding the mass of hauling locomotives)."},{"t":"table","title":"Quick reference \u2014 grain consist lengths","headers":["Consist","Length (incl locos)","Holding time"],"rows":[["AGUY \u2014 44 wagons","~750 m","34 min"],["AGUY \u2014 60 wagons","~1,010 m","40 min"],["AGUY \u2014 75 wagons","~1,260 m","49 min"],["AGAH \u2014 44 wagons","~755 m","34 min"],["AGAH \u2014 60 wagons","~1,025 m","43 min"],["AGAH \u2014 75 wagons","~1,275 m","49 min"]]}]},{"name":"Handbrake regulations \u2014 Coal NSW","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"Grade rule","content":"Ascending (uphill) grade \u2192 handbrakes applied to the REAR portion.\nDescending (downhill) grade \u2192 handbrakes applied to the FRONT portion."},{"t":"note","content":"It is advised that an emergency train brake application be made prior to applying wagon handbrakes."},{"t":"text","title":"Port discharge terminals","content":"Apply 10% of the number of wagons.\nExample: 40 wagons = 2 handbrakes front + 2 handbrakes rear."},{"t":"text","title":"Empty trains \u2014 mine site stabling","content":"Apply 20% of the number of wagons.\nExample: Mt Arthur \u2014 apply handbrakes to the first 18 wagons on an 88 wagon consist, plus loco."},{"t":"note","content":"A notation of the number of handbrakes applied must be left in the locomotive cab for the following crew."},{"t":"note","content":"For loaded trains at all locations OTHER than port discharge terminals, apply handbrakes in accordance with the ARTC TOC Manual table. The TOC table specifies requirements by grade and train length \u2014 refer to your physical TOC manual or Aurizon TOC for the applicable table."}]},{"name":"Running brake tests \u2014 Coal NSW","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"When required","content":"1. Every occasion the continuity of the Train Brake Air System has been interfered with.\n2. Every occasion the train load status changes (loaded \u2194 empty).\n3. At the first available location after departure."},{"t":"note","content":"When departing Carrington, Kooragang or Newcastle Coal Terminals the preferred location is BEYOND Hexham Provisioning facility and not over any points."},{"t":"steps","title":"Running brake test procedure","items":["Bring train to designated Train/Track speed where possible","Having due regards to train dynamics reduce throttle to Notch 1","Apply a 28% Train Brake Command","Ascertain whether the Train is braking within normal parameters","If braking normally, having due regards to train dynamics release brakes and increase to designated speed"]}]},{"name":"5000 / 5020 / 6000 brake valve test (17 steps)","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"Brake cut-out restrictions","content":"Maximum wagons with inoperative brakes: 1 in 10. Cut out wagon must have working brakes either side. Two adjacent cut out wagons are NOT permissible. Cut out wagons may not be in the last three. If LAST vehicle: emergency towing chain must be attached."},{"t":"steps","title":"Brake valve test \u2014 5000 / 5020 / 6000","items":["Apply park brake","Set loco to Lead \u2013 Cut in","Recover start up penalty if applied. Apply Independent, release Automatic Brake","Check gauges: BC approx 560kpa, BP & ER approx 500kpa, MR 750/850kpa, Flow 0","Release Independent Brake (do not depress \u2014 BC drops to 0)","Apply Automatic Brake to minimum service position (BP & ER approx 450kpa, BC rises to approx 130kpa)","Make a further Automatic Brake reduction to 430kpa (BC rises further)","Bail off the Independent Brake (BC goes to 0 in approx 10 secs)","Cut out Automatic Brake only \u2014 monitor flow and BP for 1 minute (BP must not drop more than 21kpa in 1 minute)","Cut in Automatic Brake. Apply to full service position","Slightly open the drivers and co/drivers emergency cocks in turn. BP drops to approx 330kpa. Tests maintaining feature","Move the Automatic Brake handle to Emergency (BP & ER = 0, BC = 350kpa, initiates sanding, PCS open). Go to release after recovery countdown","Ensure Independent and Automatic Brakes fully released. Wait for VC to initiate Emergency application. Recover. Go to release after recovery countdown","Apply Automatic Brake to full service. Reverser to forward, Gen field on. Move Dyn Brake to setup then notch slowly to at least notch 4","5000 class only: Apply Independent so BC > 105kpa (DB goes to B1, revs decrease). Wait for revs to settle, release independent. Release Automatic then re-apply to full service","5020/6000 class only: Apply Independent (BC rises). Release Independent (do not depress, BC = 0kpa). Set Dynamic Brake to setup (BC will rise to 350kpa)","Go out of Dynamic. Centre reverser (BC = 350kpa). Apply Independent, release Automatic (BP & ER = 500kpa, BC = 560kpa)"]}]},{"name":"26L, A7 and B7 brake valve test","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"26L / A7 / B7 test","items":["Apply handbrake or park brake. Reverser handle forward. Brake valve isolating cock open","Apply independent, Release automatic","Check gauges: BC 250/235kpa, BP & ER 500kpa, MR 700-800kpa","Release independent \u2014 do not depress handle (gauge to zero)","Auto brake minimum reduction (50kpa) \u2014 relay valve working","Quick release independent (BC zero) \u2014 No.4 independent release pipe is clear","Service application (100kpa) \u2014 note independent reapplies through control valve","Wait one minute for gauges to settle","Cut out brake valve and observe BP or BC does not fall more than 18kpa per minute","Cut brake valve back in","Ensure both brakes fully released. Press VC button. Wait for VC to initiate Emergency application","Select Dynamic (engine revs up, Independent releases to zero \u2014 magnet valve working)","Apply Independent over dynamic (325kpa) \u2014 engine revs decrease","Release independent (dynamic reapplies, engine revs up)","Reduce brake pipe pressure below 250kpa (BC reapplies, engine returns to idle \u2014 PCS working). Dynamic out","Full emergency brake application. Auto brake to running (check flow meter)","26L/30CDW ONLY: Create a small leak in brake pipe emergency cock (check application remains constant). Open emergency cock fully to running","Reapply independent brake. Conduct power and sand test. Release park brake"]}]},{"name":"Leakage test \u2014 5000 / 5020 / 6000 class","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"Leakage test procedure","items":["Set the Brake Valve to Lead Cut-out","Make 66% (100kpa) Train Brake Command and monitor the EOT to see a rapid drop in pressure to at least 450kPa","Wait one minute for brake pipe to settle","Observe brake pipe pressure for one minute","Brake Pipe pressure should not leak off more than 20 kPa per minute","Set the Brake Valve to Lead Cut-in"]}]},{"name":"10 minute ECP interim start-up brake test","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"10 minute ECP interim test","items":["Conduct a leakage test","In ECP Run mode bring up wagon status screen","Charge all auxiliary reservoirs to zero flow","Apply an emergency brake application","Wait minimum of one minute for air to settle","Note reservoir start pressure on last three master wagons","Check pressure drop in reservoir pressure over a ten minute period","Find actual effective retention from the intersection of the start and finish pressure columns","Scan other wagons for reservoir pressure losses greater than 21kPa","Record on brake certificate: actual test times and effective retention time preceded by EP \u2014 e.g. EP 201"]},{"t":"note","content":"QHAH Wagons: If the brake cylinder stroke is excessive (above 210mm) the brakes should be cut out."}]},{"name":"Coupling to a train \u2014 EPIC/vent valve procedure","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"Coupling procedure","items":["Before opening the Brake Pipe cocks, place the Automatic Brake handle into the Suppression position","Open the Brake Pipe cocks","Leave the Automatic Brake handle in Suppression for 8 seconds, then return to the Release position"]}]},{"name":"Brake ticket facts \u2014 Coal NSW","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"Type 1 \u2014 Full FX1, brake ticket by UG","content":"Driver signs to confirm: leakage test and full continuity test via ECP screen completed, correct retention time, and the last 6 wagons on the brake ticket are correct."},{"t":"text","title":"Type 2 \u2014 Pre-examined wagons, air test to do","content":"Driver signs to confirm leakage test and modified continuity test via ECP screen has been conducted. Endorse brake ticket \"AIR TEST COMPLETE\". Driver to sign."},{"t":"text","title":"Type 3 \u2014 10 minute interim startup, brake ticket by train crew","content":"Must have a current mechanical inspection and brake test certificate (FX1) in date. Conduct 10 minute Interim ECP brake retention test, complete a brake ticket, visual wagon inspection, confirm handbrakes released."},{"t":"note","content":"All brake tickets MUST have a driver's signature."}]},{"name":"ANTR 402 \u2014 Inspecting trains","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-402.pdf","version":"2.0","sections":[{"t":"text","title":"Pre-travel checks","content":"\u2022 Speed-monitoring equipment working correctly\n\u2022 Driver safety system fitted and working\n\u2022 Train lights fitted and working correctly\n\u2022 Train whistle fitted to leading end and working\n\u2022 Communications equipment working correctly"},{"t":"steps","title":"Responding to defects during travel","items":["If necessary, stop the train","Tell the Network Control Officer","If possible, check and remedy the faults"]}]},{"name":"ANTR 404 \u2014 Using brakes","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-404.pdf","version":"2.0","sections":[{"t":"steps","title":"Abnormal or defective airbrake \u2014 actions","items":["Bring the train to a complete stop","Follow the requirements of ANTR 400 Protecting trains","If possible, determine the cause of the defect","If possible, remedy the cause or defect","Tell the NCO if the defect cannot be remedied"]}]}],"ecp":[{"name":"ECP quick reference \u2014 modes, DP & setup","type":"field","source":"Hexham Depot","sections":[{"t":"text","title":"EOT status codes","content":"0 \u2014 Intact (normal)\n- - - or *** \u2014 ECP cable is apart"},{"t":"table","title":"3 types of ECP failure","headers":["Type","Description"],"rows":[["1. Penalty","Recoverable penalty application"],["2. Emergency","Emergency brake application"],["3. Fatal","Requires full reset procedure"]]},{"t":"table","title":"ECP operating modes","headers":["Mode","Description"],"rows":[["1. Run","Normal \u2014 ECP fully active"],["2. Switch","Shunting. No EOT required. No TL power. 4 hour max. 1.6 km/h only in emergency"],["3. Cut-Out","Pneumatic braking on loco only. No ECP"],["4. Emulation","Pneumatic \u2014 all wagons revert to air brakes"]]},{"t":"text","title":"DP setup order","content":"Remote \u2192 ECP \u2192 DP Lead\n\nRemote waiting to link: handle in suppression"},{"t":"table","title":"DP remote states","headers":["State","Effect"],"rows":[["Normal","Traction and brakes"],["BV Out","Traction but no brakes"],["Idle","Brakes but no traction"],["Isolate","No brakes, no traction"]]},{"t":"text","title":"For X-talks (cross-talks)","content":"1. TL power off\n2. Idle\n3. End DP\n4. End ECP"}]},{"name":"ECP emulation procedure","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"caut","content":"THE USE OF EMULATION MUST BE AUTHORISED THROUGH THE TRAIN CREW COORDINATOR, AND IN LIAISON WITH NETWORK CONTROL AND THE LIVE RUN COORDINATOR."},{"t":"steps","title":"Setting up for emulation","items":["Apply a pneumatic emergency train brake application. Brake pipe must not have more than 21kpa pressure to enter Emulation","Push the manual release button for 2-3 seconds on each master wagon. A valve shutter noise will be heard","Recharge the Brake Pipe. Brakes release when supply reservoir air recharges to 420kPa","Verify all brakes have been released","Apply a full service application and verify all brakes have applied and the last 3 in accordance with TOC requirements","Release applied hand brakes","Train may now be operated in emulation mode at maximum 32 km/h"]},{"t":"warn","content":"ECP system goes into dormant mode after 1 hour of train-line power being removed. Brakes will be released automatically. Sufficient hand brakes must ALWAYS be applied when stabling wagons."}]},{"name":"ECP \u2014 missing wagons & tech share reset","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"ECP system does not find all wagons","content":"5000 Class: Press NOT CONFIRM instead of CONFIRM.\n5020 Class: Press EDIT instead of ACCEPT.\n\nAdd missing wagons using the +1 button. Wagons not found should be manually cut out and noted on the Unit consist."},{"t":"text","title":"Technical share \u2014 ECP penalty reset","content":"1. Record messages before silencing alarms\n2. Check you have not come apart \u2014 high flow, no EOT and *** are good indicators\n3. If two ECP trains cross and both experience penalties, one train MUST go out of ECP RUN mode before the penalty will clear\n\n5000 class reset order:\nBatt Charger & Computers \u2192 Air Brake \u2192 ECP Train Line \u2192 ECP & DIST Power\n(Pause 10 secs between each. Wait 2 full minutes for shutdown. Reset in reverse order)\n\n5020s:\nBatt Charger & Computers \u2192 Air Brake 1&2 \u2192 Distributed Power \u2192 ECP"}]},{"name":"Assisting a failed ECP train \u2014 rear (EOT stays)","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"caut","content":"Under NO circumstances is a loaded NSW Aurizon Coal train to be assisted from the rear if there are empty wagons in the consist."},{"t":"steps","title":"Assisting from rear \u2014 EOT remains attached","items":["Failed train is secured (100% TBC)","The lead locomotive remains in RUN mode","Relief locomotive driver advises when ready to attach, then when attached","Do NOT attach the ECP cable or Train Brake hose between the rear wagon and the relief locomotive","The relief locomotive is to remain in Lead \u2014 Cut In","Communication check between the train crews at the front and rear","Lead locomotive crew obtains authority to proceed from NCO","Both train crews coordinate the lift with the rear locomotive working independently","When the train has cleared the gradient, stop, secure and detach rear locomotive"]}]},{"name":"Assisting a failed ECP train \u2014 rear (EOT cannot stay)","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"Assisting from rear \u2014 EOT cannot remain","items":["Failed train secured (100% TBC)","Failed train placed into SWITCH Mode","EOT marker removed and secured on last wagon","Relief locomotive driver advises when ready to attach, then when attached","Do NOT attach the ECP cable or Train Brake hose between the rear wagon and the relief locomotive","The relief locomotive is to remain in Lead \u2014 Cut In","Communication check between crews front and rear","Lead locomotive crew obtains authority from NCO","Both crews coordinate the lift \u2014 NOTE: ECP penalty will be initiated if speed exceeds 32 km/h","When the train has cleared the gradient, stop, secure, detach rear locomotive","EOT device reattached. Lead driver changes ECP mode from SWITCH to RUN"]}]},{"name":"Assisting a failed ECP train \u2014 from the front","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"Assisting from the front","items":["Apply sufficient hand brakes as per TOC manual if deemed necessary","Just prior to attaching, the failed loco driver makes an emergency Brake application","Assisting locos couple up to the front of the disabled train","Assisting loco driver changes ends, cuts in brake valve, makes an emergency brake application","On the failed trains lead engine: make an emergency brake application, go to cut out mode, cut out the brake stand","Connect the ECP cable, Brake Pipe, Main reservoir, 3 and 4 pipes and Jumper Cable between the relief locos and the original locomotives","The new lead locomotive can now be set up in ECP run mode","A continuity test and brake pipe leakage test is to be carried out","If any handbrakes had been applied they must be released"]}]},{"name":"Assisting a failed ECP train \u2014 return to interlocking","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"Rear attach \u2014 return to previous interlocking","items":["Driver of failed locomotive makes an emergency Brake application and goes to cut-out Mode","The ECP End of Train Marker is removed and secured on the last wagon","The assisting locomotive couples up to the rear of the disabled train","The ECP cable is uncoupled and the Brake Pipe tap is closed between the failed locomotive and the adjoining wagon","The failed locomotive is to remain in Lead \u2013 Cut In","The ECP cable and Brake Pipe hose is connected between the relief locomotive and the adjoining wagon","The driver of the relief locomotive sets the train up in Switch Mode","An ECP continuity test and brake pipe leakage test is carried out","If any handbrakes had been applied they must be released","Both Train Crews coordinate when releasing the brakes to depart"]}]},{"name":"Distributed power cheat sheets","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"note","content":"Tap the + Upload button to upload your DP cheat sheet PDFs. Claude will read and format them into the app automatically."}]}],"emergency":[{"name":"Tunnel evacuation checklist","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"Tunnel evacuation procedure","items":["4 long blasts on train whistle","Apply Park Brake","Emergency Brake Application","Press MU shutdown","Don Breathers","Turn all circuit breakers off","Pull battery switch lead loco if possible","Evacuate by the safest direction"]}]},{"name":"ANTR 400 \u2014 Protecting trains","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-400-Protecting-Trains-I-2-Rev-1.pdf","version":"2.1","sections":[{"t":"text","title":"When protection is required","content":"Trains require protection in all circumstances if they need assistance, or they obstruct or might obstruct adjacent lines, or the line is obstructed."},{"t":"text","title":"Track-circuited territory \u2014 10 minute rule","content":"Outside the Macarthur\u2013Maitland boundary, the Train Crew must protect a delayed train if it has been, or will be, stationary for more than 10 minutes \u2014 unless the Driver is assured by the NCO that following rail traffic has been stopped."},{"t":"text","title":"Adjacent lines","content":"The crew of a stopped train must immediately protect against approaching rail traffic if their train is, or might be, foul of adjacent lines. On bidirectional double lines, protection must be applied in both directions."}]},{"name":"ANTR 416 \u2014 Disabled trains","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-416.pdf","version":"2.0","sections":[{"t":"steps","title":"Immediate actions \u2014 disabled train","items":["Tell the Network Control Officer about the failure","Follow the requirements of ANTR 400 Protecting trains","Determine the nature of the failure"]},{"t":"caut","content":"Before stopping the forward portion of a divided train, Drivers must consider the risk of being struck by the detached portion of the train."},{"t":"steps","title":"Accidental division \u2014 driver actions","items":["Stop the train immediately","Tell the NCO about the division and, if possible, the location of the detached vehicles","Do not propel the forward portion back to detached vehicles until they are confirmed as secured"]}]},{"name":"ANTR 426 \u2014 Overdue trains","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-426.pdf","version":"2.0","sections":[{"t":"steps","title":"Stopped train \u2014 train crew actions","items":["Secure the train","Establish its location","Tell the NCO about the location and reason why the train is overdue","If necessary, protect the train in accordance with ANTR 400"]}]},{"name":"ANGE 206 \u2014 Reporting & responding to a CAN","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-206-CAN-I3-Rev2.pdf","version":"3.2","sections":[{"t":"steps","title":"Responding \u2014 immediate actions","items":["Report the condition promptly to the NCO responsible for the affected portions of track","If necessary, prevent rail traffic from approaching the affected portions","Apply protection in accordance with ANTR 400","Tell other affected NCOs and advise affected operators","Arrange to warn rail traffic crews approaching the affected portion","Arrange to prevent rail traffic from approaching and apply blocking facilities","Ask Maintenance Representatives to investigate"]}]},{"name":"ANGE 208 \u2014 Major incident response","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-208.pdf","version":"2.0","sections":[{"t":"text","title":"General","content":"If the Train Controller declares a CAN to be a major incident, rail traffic approaching and within the affected area must be stopped or warned. An Incident Management Coordinator (IMC) must control the site. Rail traffic may resume travel only if the IMC advises the Train Controller that it is safe."}]},{"name":"WOLO speed restriction \u2014 hot weather","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"table","title":"WOLO speed limits","headers":["Wagon type","Condition","Max speed"],"rows":[["QHAH and QHBH","Empty","50 km/h"],["QHAH and QHBH","Loaded at G board location","70 km/h"],["QHAH and QHBH","Loaded \u2014 all other locations","60 km/h"]]}]},{"name":"Locomotives passing through water","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"caut","content":"Damage may be caused to Traction Motors when passing through water."},{"t":"table","title":"Water crossing restrictions","headers":["Condition","Rule"],"rows":[["Water depth above 75 mm above top of rail","DO NOT pass through"],["Water less than 75 mm above rail level","DO NOT exceed 5 km/h"]]}]}],"defects":[{"name":"Wheel defects \u2014 thermal cracks, spalling, skid & scale","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"table","title":"Thermal crack speed restrictions","headers":["Class","Speed restriction"],"rows":[["Class 2","No speed restriction"],["Class 3","No speed restriction \u2014 freight vehicles must be worked out of service"],["Class 4 (pre-trip/depot)","Under no circumstances must enter service"],["Class 4 (en route)","40 km/h providing the brakes are isolated"]]},{"t":"text","title":"Wheel scale & skid","content":"Surface wheel scale only \u2192 vehicle may travel at normal speed.\nGreater thickness \u2192 act in accordance with TOC manual.\nSingle flat less than 25 mm \u2192 normal speed. Multiple or larger flat spots \u2192 TOC manual."}]},{"name":"Changing auto coupler knuckles","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"caut","content":"This procedure involves heavy manual lifting. A risk assessment must be carried out prior to carrying out this procedure."},{"t":"text","title":"Knuckle types & tools","content":"Bradken Type \u2014 found on 5000, 5020s and QHAH wagons.\nAlliance Type \u2014 found on most QHBH, QHCH and 423 class locos/wagons.\n\nTools: Hammer \u2022 Pinch Bar \u2022 Cold Chisel \u2022 Pliers \u2022 Long Shank Flat Blade Screw Driver \u2022 Spare Split Pin \u2022 Torch"},{"t":"steps","title":"Knuckle replacement procedure","items":["Implement safety measures to protect the disabled train. CSB protection in place by Network Control","Both portions of the train secured per QRNC NSW Handbrake Regulations","Second Person ascertains type of auto coupler knuckle required","Undertaken by BOTH members of train crew","Remove split pin from bottom of retaining pin. Lift pin out. CAUTION: be careful of broken portion falling","Remove broken portion of the auto coupler knuckle","When inserting new knuckle, hook shaped retainer must be held back ~half way before knuckle slides in. Use Long Shank Flat Blade Screwdriver. DO NOT USE FINGERS","When in place, insert retaining pin and secure with split pin","Driver returns to Locomotive","Driver and Second Person communicate on reattaching both portions of the train","After train is in one portion, reattach all hoses and cables and release handbrakes from rear portion","Prior to Second Person returning to Locomotive, perform a modified continuity test","Second Person returns to Locomotive, ensure all tools returned to tool cabinet","Train Crew advises Network Control train is ready to depart"]}]},{"name":"ANTR 406 \u2014 Using train lights","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-406.pdf","version":"2.0","sections":[{"t":"text","title":"Principle","content":"At least one white marker light at the front and at least one approved red tail light or EOT marker at the rear. Both must be lit during travel."},{"t":"text","title":"Headlights","content":"Must travel with headlight on FULL when moving.\n\nDim when: approaching an opposing train, handsignals displayed or approaching workers on track, or at a shunting location.\n\nSwitch off when stopped clear of Main Line, or waiting for opposing rail traffic (at their request)."},{"t":"text","title":"Defective headlights","content":"May continue at normal speed if visibility good. If visibility low: restricted speed, not exceeding 25 km/h over level crossings, past platforms, or through tunnels and cuttings."}]},{"name":"ANTR 408 \u2014 Using train whistles","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-408.pdf","version":"2.0","sections":[{"t":"text","title":"When whistles must be sounded","content":"Approaching: level crossings \u2022 shunting on adjacent tracks \u2022 crossing or passing at sidings and loops \u2022 people or animals on or near the track \u2022 WHISTLE signs \u2022 tunnel entrances and exits (unless signs instruct otherwise) \u2022 when detonators are exploded on the line \u2022 as necessary for safety"},{"t":"table","title":"Whistle codes","headers":["Code","Meaning"],"rows":[["Continuous","Stop immediately"],["Short-short-long","Rail traffic is about to be propelled"]]},{"t":"caut","content":"Rail traffic with neither a working headlight NOR a working whistle must not exceed 25 km/h over level crossings, through tunnels and cuttings, past platforms, or in low visibility."}]},{"name":"ANTR 410 \u2014 Defective equipment","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-410.pdf","version":"2.0","sections":[{"t":"text","title":"Speedometers","content":"If defective, remedy if possible. If the fault persists must not exceed speed limits. May continue until re-marshalled or repaired."},{"t":"text","title":"Driver safety systems","content":"If systems fail completely with a single crew member, Driver must stop the train and tell the NCO. Operator must arrange a second Qualified Worker in the driving cab before the train continues."}]},{"name":"ANTR 412 \u2014 Defective running gear","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-412.pdf","version":"2.0","sections":[{"t":"steps","title":"Suspected defective running gear \u2014 actions","items":["If necessary, stop the train","Tell the Network Control Officer","Follow the requirements of ANTR 400 Protecting trains","Determine the nature and extent of the defect"]},{"t":"text","title":"Overheating axle boxes","content":"HOT axle box: Driver must stop the train immediately and tell the NCO.\n\nWARM axle box: Assess whether the affected vehicle can travel and at what speed, then re-inspect in accordance with the TOC manual."}]},{"name":"ANTR 414 \u2014 Defective vehicles","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-414.pdf","version":"2.0","sections":[{"t":"steps","title":"Responding to vehicle defects","items":["If necessary, stop the train","Tell the NCO","Follow the requirements of ANTR 400","Investigate the nature of the defect","Tell the NCO about the defect and whether it can be remedied on site","If defective vehicles are able to travel, tell the NCO about operating restrictions"]},{"t":"text","title":"Red cards","content":"Vehicles not certified as safe to travel must be labelled with a NOT TO GO card (red card) on each side."}]}],"route":[{"name":"Hunter Valley ruling grades \u2014 quick reference","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"Grade colour coding","content":"Green = Gentle Hill\nYellow = Moderate Hill\nRed = Steep Hill"},{"t":"text","title":"Plug loading \u2014 5000 class","content":"Generally need to start off in 3 notch when plug loading at Ashton or when needed at Wilpinjong."}]},{"name":"Sectional running times \u2014 Up (loaded), 80\u202fkm/h max","type":"field","source":"Personal cheat sheet","sections":[{"t":"table","title":"Muswellbrook \u2192 Newcastle (Up loaded)","headers":["Location","Time from Muswellbrook"],"rows":[["Antiene / Drayton Jct","15 min"],["Ravensworth / Mt Owen area","25 min"],["Singleton","50 min"],["Whittingham","55 min"],["Branxton","68 min"],["Greta","73 min"],["Lochinvar","78 min"],["Maitland","88 min"],["Beresfield","95 min"],["Hexham","105 min"],["Port Waratah / Kooragang","115 min"]]},{"t":"note","content":"Times are approximate for a loaded 88-wagon coal train at maximum line speed. Actual times vary with pathing, signals and consists. Up direction running times are affected significantly by grade \u2014 allow extra time through Drayton and Minimbah sections."}]},{"name":"Sectional running times \u2014 Down (empty) Hexham to Muswellbrook","type":"field","source":"Hexham Depot","sections":[{"t":"note","content":"Maximum 80 km/h. Times are from Hexham start."},{"t":"table","title":"Down direction running times","headers":["Location","Time from Hexham"],"rows":[["Maitland","15 mins"],["Lochinvar","25 mins"],["Greta","32 mins"],["Branxton","37 mins"],["Whittingham","55 mins"],["Singleton","60 mins"],["Camberwell","70 mins"],["Mount Owen","75 mins"],["Hebden Road","80 mins"],["Draytons","90 mins"],["Antiene","95 mins"],["Grasstree","105 mins"],["Muswellbrook","110 mins"]]}]},{"name":"Route methodology \u2014 Main North (Newcastle \u2194 Muswellbrook)","type":"route","source":"Aurizon DP Consist Ver 1.1 \u2014 28 sections both directions","sections":[{"t":"note","content":"Open the full interactive route methodology using the UP or DOWN buttons above. The methodology covers all 28 sections from Newcastle to Muswellbrook with driving notches, signal tables, grade profiles and loop locations."}]}],"otherlines":[{"name":"Eraring \u2014 UP direction (loaded to port)","type":"field","source":"Hexham Depot \u2014 Cheat Sheet","sections":[{"t":"table","ti
