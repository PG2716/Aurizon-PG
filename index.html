1,380 m","Check consist"],["Willow Tree","1,814 m","Longest loop on line \u2014 OK 88w"],["Braefield","1,427 m","OK 88w"],["Quirindi","785 m","Goods loop only \u2014 check with NCO for available road \u2014 \u26a0 Short"],["Bells Gate","1,350 m","Check consist"],["Quipolly","426 m","Short loop \u2014 check train length before entering \u2014 \u26a0 Short"],["Werris Creek (Goods Loop)","1,372 m","Check consist"],["Burilda","1,350 m","Check consist"],["Breza 2A","1,350 m","Check consist"],["Watermark","1,492 m","OK 88w"],["Curlewis","1,360 m","Check consist"],["Gunnedah","399 m","Approx \u2014 check current yard arrangement with NCO \u2014 \u26a0 Short"],["Emerald Hill","1,340 m","Northern section \u2014 Check consist"],["Boggabri","1,382 m","Northern section \u2014 Check consist"],["Turrawan","1,088 m","Northern section \u2014 \u26a0 Short"],["Narrabri","\u2014","No loop length listed"]]},{"t":"table","title":"Train length reference","headers":["Consist","Length (incl locos)"],"rows":[["88w QHBH / QHAH","1,514 m"],["88w QHCH","~1,391 m"],["82w QHCH","1,320 m"],["44w QHBH / QHAH","779 m"]]}]}],"mines":[{"name":"Mt Arthur \u2014 entry procedure","type":"field","source":"Hexham Depot \u2014 Cheat Sheet","sections":[{"t":"text","title":"Before entry","content":"Call at Singleton."},{"t":"table","title":"Mt Arthur key data","headers":["Item","Detail"],"rows":[["TSI","60"],["Start notches","3-1 to 6-1"],["Finish notches","6-2"],["Loading time","2 hours"],["Departure signal","DJ70 \u2014 60YL dull pulse \u2014 58 turnout"],["Departure speeds","20\u201330 km/h"]]}]},{"name":"Mt Pleasant \u2014 entry procedure","type":"field","source":"Hexham Depot \u2014 Cheat Sheet","sections":[{"t":"text","title":"Before entry","content":"Call at Branxton. Headlight off."},{"t":"table","title":"Mt Pleasant key data","headers":["Item","Detail"],"rows":[["TSI","50"],["Approach","Medium at Muswellbrook. Caution turnout. X60"],["Entry","Calling on. 25 km/h after home stick"],["DP notches","3 in front, 2 in rear"]]}]},{"name":"Malabar \u2014 entry procedure","type":"field","source":"Hexham Depot \u2014 Cheat Sheet","sections":[{"t":"text","title":"Before entry","content":"Call at Branxton. UHF \u2014 Malabar Maxwell."},{"t":"table","title":"Malabar key data","headers":["Item","Detail"],"rows":[["TSI","41"],["Loop speed","20 km/h"],["DP in front","4 notch"],["DP in back","0"],["Brake change","~1,300 m use independent, then switch to plug 1\u21922\u21923\u21924"],["Departure signal","DJ64 \u2014 requires SPA"],["Restriction","Do not pass DJ60"]]}]},{"name":"Bengalla \u2014 entry procedure","type":"field","source":"Hexham Depot \u2014 Cheat Sheet","sections":[{"t":"text","title":"Before entry","content":"Call at Branxton AND Muswellbrook."},{"t":"table","title":"Bengalla key signals","headers":["Signal","Action"],"rows":[["After Muswellbrook MK217","Flasher"],["MK221","Caution"],["MK227","Dead end signal"],["TSI","11"]]}]},{"name":"Wambo \u2014 entry & exit procedure","type":"field","source":"Hexham Depot \u2014 Cheat Sheet","sections":[{"t":"text","title":"Entry","content":"Route indicated at bridge \u2014 up or down loop\nX75 onto a 60\nCall at junction\nX40 down loop | 60 to Mt Thorley branch\nGreen for Wambo | Medium for Bulga/Mt Thorley\nSaxonvale Junction: medium onto turnout, X50 Wambo branch\nGreen at industrial estate\n20 km/h TSR\nPink pig relief point\nCalling on at bridge \u2014 15 km/h max\nStop board just after tunnel \u2014 get permission\nTSI 41 | Fence up"},{"t":"table","title":"Wambo DP notches","headers":["Position","Notches"],"rows":[["Front \u2014 loading","1\u21922\u21923\u21924 with independent"],["Remote \u2014 at bridge","1"],["Finish","7-1"]]},{"t":"text","title":"Exit","content":"25 km/h speed\n50 km/h at tunnel"}]},{"name":"Camberwell Junction \u2014 Mt Owen \u2014 Ashton area","type":"field","source":"Personal cheat sheet","sections":[{"t":"text","title":"Camberwell Junction (CL signals)","content":"CL signals controlled by Upper Hunter 1.\nCamberwell Loop \u2014 standard crossing loop, verify loop direction with NCO.\nMt Owen branch diverges at Camberwell Junction.\nGreen signal for Camberwell main line. Branch signal for Mt Owen/Ashton."},{"t":"text","title":"Mt Owen Junction (MN signals)","content":"MN signals controlled by Upper Hunter 1.\nEntry: medium speed approaching mine entrance, calling on signal procedure applies.\nDeparture: DJ signals at Drayton Junction."},{"t":"text","title":"Ashton Coal","content":"Access via Mt Owen Junction.\nCheck with NCO for current TSI and entry procedure.\nRestricted speed throughout mine site."}]},{"name":"Ravensworth \u2014 Newdell Junction area","type":"field","source":"Personal cheat sheet","sections":[{"t":"text","title":"Newdell Junction (NJ signals)","content":"NJ signals controlled by Upper Hunter 1.\nRavensworth branch diverges at Newdell Junction.\nMt Thorley/Warkworth access also via this area.\nVerify which branch is required with NCO before approaching junction."},{"t":"text","title":"Ravensworth / Rix Creek / Camberwell","content":"Restricted speed at all times on private sidings.\nCalling on signal procedure for entry \u2014 do not proceed without authority from mine signal operator.\nCheck current TSI with NCO."}]},{"name":"Drayton Junction \u2014 Liddell \u2014 Hunter Valley area","type":"field","source":"Personal cheat sheet","sections":[{"t":"text","title":"Drayton Junction (DJ signals)","content":"DJ signals controlled by Upper Hunter 1.\nDJ 54/DJ 76 \u2014 verbal authority from UH1.\nBranch lines to Liddell, Hunter Valley Operations and other mines diverge near Drayton.\nNote: TSI numbers vary by loading point \u2014 confirm with NCO."},{"t":"text","title":"Hunter Valley Operations / Liddell","content":"Medium speed approaching mine area.\nRestricted speed throughout private mine sidings.\nCalling on signal required for mine entry.\nFence up rule applies \u2014 check with mine coordinator."}]}],"ptwaratah":[{"name":"Track circuited & non-track circuited areas","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"RVDS areas \u2014 Port Waratah","content":"Track circuited areas commence on arrival at PW2 and PW4 signals and continue to:\n\u2022 STOP Board at \"C\" frame Morandoo\n\u2022 STOP Board after 50 signal on No.1 Grain Arrival Road\n\u2022 STOP Board after 51 signal on No.2 Grain Arrival Road\n\u2022 STOP Board at the entry to the Reception Sidings\n\u2022 STOP Board at the entry to No.9 Nest North End\n\u2022 \"F\" frame East End\n\u2022 STOP Board after 35 signal at the Departure Yard"},{"t":"text","title":"RVDS areas \u2014 Kooragang Island","content":"Track circuited areas commence at NFD4, SFD1 and NFU2 signals and continue to:\n\u2022 Walsh Point Main to AGL crossing at 177.918 km\n\u2022 Around the Balloon Loop including the Departure Roads"}]},{"name":"Train movements \u2014 PW / Kooragang procedures","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"Departing the non-track circuited network","items":["Rail traffic crew contacts the Terminal Coordinator via radio advising readiness to depart","The Terminal Coordinator contacts the Network Controller and confers regarding the impending departure","The Terminal Coordinator advises the rail traffic crew of the agreed arrangements via radio"]},{"t":"steps","title":"Departing the track circuited network","items":["Rail traffic crew contacts the Network Control Officer via radio advising readiness to depart","The NCO contacts the Terminal Coordinator before allowing rail traffic to pass the last controlled signal","The NCO and Terminal Coordinator must come to a clear understanding before the movement occurs","When a clear understanding has been reached the NCO may clear the signal"]},{"t":"text","title":"Terminal entry \u2014 restricted speed locations","content":"Pt Waratah: 10 km/h from PW1, PW2, PW3 to Industrial Hwy Bridge then 5 km/h to the bins.\n\nAlways restricted speed on a shunt or dead end signal at:\nNCIG \u2022 Moolarben \u2022 Mt Arthur \u2022 Wambo \u2022 Bengalla \u2022 Mt Thorley/Warkworth \u2022 Hunter Valley/Newdell/Liddell \u2022 Ashton \u2022 Mt Owen \u2022 Drayton \u2022 Wilpinjong \u2022 Ravensworth \u2022 Camberwell/Rix Creek \u2022 Bulga"}]},{"name":"ANTR 418 \u2014 Yard limits","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-418.pdf","version":"4.0","sections":[{"t":"text","title":"Yard working","content":"Rail traffic movements on running lines within yard limits must be authorised by Signallers at attended locations, or Train Controllers for unattended locations. Unsignalled movements within yard limits must not exceed 25 km/h."},{"t":"note","content":"For unsignalled movements in a tunnel, the Driver must not exceed 10 km/h, must stop at platforms and get the Signaller's permission to proceed."}]},{"name":"ANTR 420 \u2014 Shunting and marshalling","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-420.pdf","version":"2.0","sections":[{"t":"caut","content":"If communication between a Qualified Worker directing shunting and a Driver is interrupted, the Driver must stop the train immediately."},{"t":"text","title":"Prohibited methods","content":"Loose shunting and gravitation shunting must NOT be used. Vehicles carrying dangerous goods must be shunted under locomotive control."}]},{"name":"ANTR 424 \u2014 Propelling trains","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-424.pdf","version":"2.0","sections":[{"t":"caut","content":"If communication between a Driver and the Qualified Worker directing propelling is interrupted, the Driver must stop the train immediately."},{"t":"text","title":"Over level crossings","content":"Must not exceed 10 km/h before the leading vehicle has cleared the crossing."}]},{"name":"ANTR 422 \u2014 Shunting at intermediate sidings","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-422.pdf","version":"2.0","sections":[{"t":"text","title":"Reporting","content":"Train Crews must report arrival at and departure from intermediate sidings to the NCO responsible for the location."},{"t":"text","title":"After shunting \u2014 restore everything","content":"\u2022 Set points and signals to their normal positions\n\u2022 Restore releases to their normal positions\n\u2022 Return keys to their normal locations"},{"t":"steps","title":"Returning to running line after stabling","items":["Have the NCO's authority to return","Make sure the route has been set correctly","Have the correct Proceed Authority"]}]}],"locos":[{"name":"5000 / 5020 / 5040 class \u2014 full specifications","type":"field","source":"Hexham Depot","sections":[{"t":"text","title":"Builder & build details","content":"5000 series: United Goninan, Broadmeadow NSW, 2005\u20132007\n5020 series: United Goninan Group Ltd (Rail), Chullora NSW, 2010\u20132011\n5040 series: Broadmeadow NSW, 2014\u20132015\nRunning numbers: 5000\u20135012, 5021\u20135045"},{"t":"table","title":"Key specifications","headers":["Parameter","Value"],"rows":[["Weight","180 tonnes"],["Model","C40aci (5000) | 44acHi (5020/5040)"],["Max axle load","30.0 tonnes"],["Maximum speed","80 km/h"],["Engine type","GE 7FDL16 EFI, Turbocharged"],["Engine speed","1050/440 rpm (max/min)"],["Low idle speed","330 rpm (5000) | 322 rpm (5020/5040)"],["Brake equipment","Wabtec EPIC II / ECP"],["Gross power","3169 kW (5000) | 3355 kW (5020/5040)"],["Tractive power","3005 kW (5000) | 3184 kW (5020/5040)"],["Continuous tractive effort","586 kN @ 23.3 km/h (5000) | 645 kN @ 16 km/h (5020/5040)"],["Max dynamic braking effort","352 kN (5000) | 355 kN (5020/5040)"],["Length over couplers","22,000 mm"],["Height","4,242 mm"],["Width","2,930 mm"],["Fuel capacity","9,000 litres"],["Sand capacity","0.500 cubic metres"],["Lube oil capacity","1,552 litres"],["Cooling water capacity","915 litres"]]}]},{"name":"6000 class \u2014 specifications & notes","type":"field","source":"Personal notes","sections":[{"t":"table","title":"6000 class key specifications","headers":["Parameter","Value"],"rows":[["Builder","Electro-Motive Diesel (EMD) / Progress Rail"],["Model","SD70ACe-T4 / SD70M-2"],["Running numbers","6001 series (Aurizon)"],["Weight","~210 tonnes"],["Max speed","80 km/h"],["Engine","EMD 16-710G3C-T4 (or equivalent)"],["Gross power","~3,200 kW"],["Brake equipment","ECP / conventional air"],["Fuel capacity","~12,000 L (check loco placard)"],["Slow speed","Fitted \u2014 2 km/h slow speed control"]]},{"t":"table","title":"6000 class kN per notch","headers":["Notch","kN (approx)"],"rows":[["N1","44"],["N2","140"],["N3","240"],["N4","320"],["N5","390"],["N6","440"],["N7","475"],["N8","510"]]},{"t":"text","title":"Key differences from 5000/5020","content":"Higher fuel capacity (up to 12,000 L vs 9,000 L).\nSlightly heavier \u2014 affects handbrake calculations.\nDifferent cab layout \u2014 brake stand position differs.\n6000 class can run as lead or remote in DP consists.\nCheck loco-specific placard for exact fuel and sand capacity as individual units vary."},{"t":"note","content":"Always check the locomotive placard for the specific unit's fuel, sand, oil and water capacities \u2014 values vary between individual 6000 class units."}]},{"name":"kN per notch \u2014 all classes","type":"field","source":"Hexham Depot","sections":[{"t":"table","title":"5000 / 5020 / 5040 class","headers":["Notch","kN"],"rows":[["1","67"],["2","220"],["3","380"],["4","500"]]},{"t":"table","title":"6000 class (all notches)","headers":["Notch","kN"],"rows":[["N1","44"],["N2","140"],["N3","240"],["N4","320"],["N5","390"],["N6","440"],["N7","475"],["N8","510"]]},{"t":"note","content":"Values are approximate. Dynamic braking effort varies with speed."}]},{"name":"Slow speed & general notes","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"Slow speed information","content":"In slow speed, No 2 traction motor is used as a speed monitor. It has been found to be much more reliable and accurate than the speed sensor arrangement and has been adopted by GE."}]},{"name":"Hexham isolation & lockout procedure","type":"field","source":"Hexham Depot","sections":[{"t":"text","title":"Procedure","content":"Hexham Provisioning Crew/Train Crew to ask for the release for the applicable road from Hexham Control and the isolating person to Lock Out road."},{"t":"steps","title":"Before provisioning \u2014 Isolating Person must","items":["Apply 100% TBC","Fully apply the Independent Brake","Remove Reverser and place into red Lock Box","Gen Field switch OFF","Park Brake applied","ECS to Isolate","Fit the Lockout Devices to reverser and independent","Attach the green Group Lock and red Personal Lock to the lockbox"]},{"t":"table","title":"Isolation equipment","headers":["Equipment","Description"],"rows":[["Personal lock (red)","Padlock uniquely keyed to an individual. Used for personal protection"],["Equipment lock (yellow)","Padlock placed by Authorised Isolator to physically lock out an isolation point"],["Group lock (green)","Lock applied by Authorised Isolator to a group isolation box"],["Multi lock device","Allows multiple persons to secure their personal isolation locks"]]}]}],"contacts":[{"name":"Radio channels & loading point prefixes","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"Rollby radio channels","content":"Kooragang: KCL Admin\nPt Waratah: PW SHT 7\nNCIG bin 1: NCIG\nNCIG bin 2: NCIG"},{"t":"text","title":"Terminal communications","content":"All trains/engines must be logged onto the Countrynet System. All trains must have hand held radios on PW Admin channel. ARTC WB channel (450.050) and/or landline/mobile as backup."},{"t":"text","title":"Aurizon coal unit numbers","content":"Aurizon unit numbers: 60\u201379 + 651"},{"t":"text","title":"NCIG run numbers","content":"9 run numbers\nFence up from NFU2\n5 lead \u2014 reduce remote to 0 to stop run-in\nTSI: Bin 1 = 51 \u2022 Bin 2 = 52\n2 notch lead, 1 remote\nSlow speed 2 km/h \u2192 reduce to 1.7 km/h"}]},{"name":"Train fuel levels \u2014 Coal & Grain","type":"field","source":"Hexham Depot","sections":[{"t":"text","title":"Coal train fuel levels","content":"Mixed trips: 6000CL \u2013 12,500 ltrs | 5000/5020CL \u2013 8,500 ltrs\nTrip head 100k runner (6000CL): 10,500 ltrs\nShort train 44 wagons (5020CL): 8,500 ltrs\nShort train 44 wagons (6000CL): 8,900 ltrs\nIllawarra DP 44 wagons (NOT LOADING): 7,300 ltrs\n6000CL locos in yard: 7,300 ltrs"},{"t":"text","title":"Grain train fuel levels","content":"Northern Region load points: MAX 7,300 ltrs\nCentral West load points: MAX 7,000 ltrs"}]},{"name":"Wagon lengths & train lengths","type":"field","source":"Hexham Depot","sections":[{"t":"table","title":"Coal wagons","headers":["Type","Length"],"rows":[["QHBH","16.7 m"],["QHAH","16.7 m"],["QHCH","15.3 m"]]},{"t":"table","title":"Coal train lengths (including locos)","headers":["Consist","Length"],"rows":[["44 wagons QHBH/QHAH","779 m"],["88 wagons QHBH/QHAH","1,514 m"],["82 wagons QHCH","1,320 m (wagons only 1,299 m)"],["88 wagons QHCH","1,346 m wagons only / 1,391 m + locos"],["96 wagons QHCH","1,535 m"]]},{"t":"table","title":"Grain wagons","headers":["Type","Length"],"rows":[["AGAH","16.7 m"],["AGUY","16.572 m"]]}]},{"name":"Aurizon unit phone numbers","type":"field","source":"Aurizon Hexham \u2014 Phone List","sections":[{"t":"note","content":"Units highlighted in red (63, 65, 71, 76) are marked on the original phone list. Unit 653 has no number listed."},{"t":"table","title":"Coal unit phone numbers","headers":["Unit","Mobile","Notes"],"rows":[["Unit 60","0428 767 766",""],["Unit 61","0498 288 582",""],["Unit 62","0448 768 840",""],["Unit 63","0428 981 800","\u2605 Highlighted"],["Unit 64","0429 346 686",""],["Unit 65","0498 288 582","\u2605 Highlighted"],["Unit 66","0459 480 425",""],["Unit 67","0428 747 640",""],["Unit 68","0459 251 054",""],["Unit 69","0492 022 232",""],["Unit 70","0459 247 385",""],["Unit 71","0439 596 363","\u2605 Highlighted"],["Unit 72","0488 789 241",""],["Unit 73","0429 853 580",""],["Unit 74","0473 159 464",""],["Unit 75","0439 587 939",""],["Unit 76","0417 478 373","\u2605 Highlighted"],["Unit 77","0437 631 178",""],["Unit 78","0408 736 598",""],["Unit 79","0456 216 579",""],["Unit 651","0437 523 244",""],["Unit 653","\u2014","No number listed"],["Unit 657","0429 491 757",""],["Unit 659","0417 534 107",""]]}]}],"rules":[{"name":"ANGE 200 \u2014 Walking in the danger zone","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-200-Walking-in-the-Danger-Zone-I-2-Rev-1.pdf","version":"2.1","sections":[{"t":"text","title":"Definitions","content":"Danger Zone: all space within 3 metres horizontally from the nearest rail and any distance above or below this 3m.\n\nRail Corridor: everywhere within 15m of the outermost rails."},{"t":"warn","content":"Rail traffic can approach from either direction at any time."},{"t":"text","title":"Safety requirements in the Danger Zone","content":"\u2022 Wear approved high-visibility clothing\n\u2022 Look frequently in BOTH directions for approaching rail traffic\n\u2022 Carry a light at night, in tunnels, and when visibility is limited\n\u2022 Do NOT step on or within points"}]},{"name":"ANGE 202 \u2014 Handsignals","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-202.pdf","version":"3.0","sections":[{"t":"table","title":"General handsignals","headers":["Signal","Flags","Lights","Hands"],"rows":[["STOP or DANGER","Steady red flag","Steady red light","Both hands held high"],["PROCEED AT CAUTION","Wave green slowly","Wave green slowly","Wave arm slowly"],["PROCEED AT NORMAL SPEED","Steady green flag","Steady green light","\u2014"],["ALL CLEAR","\u2014","Steady white light","One hand held up"]]},{"t":"table","title":"Shunting handsignals","headers":["Signal","Lights","Hands"],"rows":[["MOVE AWAY","Swing white light backwards and forwards","Move hand and forearm in circular motion"],["MOVE AWAY AT CAUTION","Swing green light backwards and forwards","Circular motion, other hand raised high"],["MOVE TOWARDS ME","Wave white light slowly","Wave arm slowly overhead"],["MOVE TOWARDS ME AT CAUTION","Wave green light slowly","Wave one arm overhead, other hand raised high"]]}]},{"name":"ANGE 204 \u2014 Network communication","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE_204_Network_Communication_I2_Rev1.pdf","version":"2.1","sections":[{"t":"text","title":"Principle","content":"Communication must be clear, brief and unambiguous. Use the 24-hour clock for all Safeworking communication."},{"t":"text","title":"Open-channel radio protocols","content":"Check the channel is not in use before transmitting (except in emergency). End each statement with \"Over\" and expect a reply. End each transmission with \"Out\". Communications from a train must include the sender's train number."},{"t":"warn","content":"Never assume a receiver has understood a message before they confirm it."}]},{"name":"ANGE 210 \u2014 Speed restrictions during hot weather (WOLO)","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE_210_I-2_Rev-1.pdf","version":"2.1","sections":[{"t":"note","content":"Unless different advice is given, hot weather speed restrictions apply only on the day they are imposed and between 1200hrs and 2000hrs."}]},{"name":"ANGE 212 \u2014 Network information publications","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE_212_I2_Rev-2.pdf","version":"2.2","sections":[{"t":"text","title":"Publications workers must have access to","content":"\u2022 Network Rules \u2022 Network Procedures \u2022 Network Forms \u2022 Network Information Books (NIBs) \u2022 Electrical Safety Instructions \u2022 Train Alteration Advice (TAA) \u2022 Route Access Standard (RAS) \u2022 Train Operating Conditions (TOC) manual \u2022 TOC Waivers \u2022 SAFE Notices \u2022 Speed Restriction Notices"}]},{"name":"ANGE 216 \u2014 Level crossings","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-216-Level-Crossings-I-3-Rev-1.pdf","version":"3.1","sections":[{"t":"steps","title":"Type F crossing predictor \u2014 actions","items":["Do not exceed 25 km/h until the leading vehicle has passed over the level crossing","Check whether the warning equipment is operating correctly","Proceed over the level crossing only if it is safe to do so"]}]},{"name":"ANGE 218 \u2014 Type F level crossing management","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-218.pdf","version":"2.0","sections":[{"t":"steps","title":"Driver \u2014 potentially faulty crossing (CAN issued)","items":["Stop short of the level crossing","Check whether the warning equipment is operating correctly","Report condition to the NCO as soon as possible","If equipment operating correctly \u2014 proceed","If not operating correctly \u2014 treat the crossing as faulty"]},{"t":"steps","title":"Driver \u2014 faulty crossing, no Handsignaller","items":["Stop short of the level crossing","Arrange to stop approaching road and pedestrian traffic","Proceed only if it is safe to do so"]}]},{"name":"ANGE 220 \u2014 Unreliable track-circuit operation","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-220.pdf","version":"3.0","sections":[{"t":"text","title":"Identifying unreliable track circuits","content":"Track circuits are treated as unreliable if:\n\u2022 Reported as suspected faulty by a Qualified Worker\n\u2022 Not travelled over by rail traffic for 72 hours or more"},{"t":"note","content":"As a driver: if you suspect a track circuit has failed to detect your train, report to the NCO immediately."}]},{"name":"ANGE 222 \u2014 Working around electrical infrastructure","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-222.pdf","version":"2.0","sections":[{"t":"warn","content":"NEVER closer than 1 metre to the 1500V overhead wiring."},{"t":"text","title":"Key prohibitions","content":"\u2022 Do NOT climb on top of rail vehicles on electrified track without authorisation\n\u2022 Do NOT cause water or debris to fall onto 1500V overhead wiring\n\u2022 Do NOT use metal ladders within 6 metres of 1500V overhead wiring\n\u2022 Only Electrical Representatives may remove objects caught in overhead wiring"}]},{"name":"ANGE 230 \u2014 Communications equipment","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE_230_Communications_Equipment_I3_Rev1.pdf","version":"3.1","sections":[{"t":"table","title":"Communications equipment protocols","headers":["Equipment","Protocol","Emergency button"],"rows":[["450.050 MHz radio","Open channel","No"],["In Cab Equipment (ICE) radio","Discrete-channel for Train Control; open-channel otherwise","Yes"],["MetroNet","Discrete-channel","Yes"],["UHF radios","Open channel","No"],["Mobile phones","Discrete-channel","No"]]}]},{"name":"ANGE 232 \u2014 Responsibilities of rail traffic crews","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-232-Responsibilities-of-Rail-Traffic-Crews-I-3-Rev-1.pdf","version":"3.1","sections":[{"t":"steps","title":"Train crew responsibilities","items":["Be responsible for the safe operation of rail traffic and the safety of other crew and passengers","Tell a NCO about breaches of ARTC Network Rules and Network Procedures","Promptly report delays to the NCO","Be qualified to operate the rail traffic driven in the ARTC Network","Be qualified in the systems of Safeworking relevant to the area of operation","Cooperate with Network Control Officers, Pilots, or other authorised persons","Delegate duties only to Qualified Workers"]},{"t":"text","title":"Change of crew","content":"Rail Traffic Crews must tell a relieving crew about any conditions that could affect the operation of the rail traffic."}]},{"name":"ANGE 234 \u2014 Responsibilities of Signallers","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-234.pdf","version":"2.0","sections":[{"t":"text","title":"Primary responsibility","content":"Set routes for the safe and efficient transit of trains in the area under their control."},{"t":"text","title":"Signaller responsibilities","content":"\u2022 Ensure signalling equipment is operated safely\n\u2022 Respond to equipment failures and warning alarms\n\u2022 Authorise and issue Proceed Authorities and work on track authorities\n\u2022 Tell affected Train Controllers and Signallers about delayed or out-of-course movements\n\u2022 Promptly report breaches of ARTC Network Rules\n\u2022 May divert rail traffic to avoid unnecessary delays"}]},{"name":"ANGE 236 \u2014 Responsibilities of Train Controllers","type":"artc","source":"ARTC NSW General Rules","url":"https://www.artc.com.au/uploads/ANGE-236.pdf","version":"2.0","sections":[{"t":"text","title":"Primary responsibility","content":"Manage train paths for the safe and efficient transit of rail traffic through the ARTC Network."},{"t":"text","title":"Train Controller responsibilities","content":"\u2022 Plan, set priorities for and manage train services, work on track authorities, Proceed Authorities, and liaison with Operators and Maintenance Representatives\n\u2022 Respond to equipment failures and warning alarms\n\u2022 Promptly report breaches of ARTC Network Rules\n\u2022 Compile and maintain records of conditions and movements in the ARTC Network"}]},{"name":"ANTR 428 \u2014 SAFE Notices","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR-428.pdf","version":"2.0","sections":[{"t":"text","title":"What is a SAFE Notice","content":"SAFE Notices give immediate notice of changes or exceptions to ARTC Network information publications. A SAFE Notice remains in force for 180 days unless a shorter period is specified, a new SAFE Notice extends its currency, or affected pages are republished."},{"t":"note","content":"Operators and Qualified Workers who receive a SAFE Notice must follow its requirements."}]},{"name":"ANTR 430 \u2014 TOC Waivers","type":"artc","source":"ARTC NSW Train Working","url":"https://www.artc.com.au/uploads/ANTR_430_Train_Operating_Conditions_Waiver_I2_Rev1.pdf","version":"2.1","sections":[{"t":"text","title":"What is a TOC Waiver","content":"Gives notice of changes or exceptions to the published ARTC Train Operating Conditions (TOC) manual. Permanent changes must be confirmed by publication in the Route Access Standard (RAS) or Rolling Stock Standards."},{"t":"note","content":"Operators and Competent Workers who receive a TOC Waiver must follow its requirements."}]}],"procedures":[{"name":"Locked up running \u2014 securing unattended train","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"note","content":"Only to be implemented under instruction from the LRC, Train Crew Coordinator or Manager. Advise ARTC Yard Coordinator of intention."},{"t":"steps","title":"Steps to secure locomotives and unattended train","items":["Apply Locomotive Park Brake","Apply a Full Service / 100% Train Brake Command","Remove reverser and secure in the receptacle","Switch off Generator Field Circuit Breaker","Place engine control switch into the start position","Endorse the Loco Log Book with \"Locked Up Running at [time and date]\"","Leave all step and vestibule lights on","Close all windows and Lock all Locomotive Cabs","Place softwood chocks under the lead locos #2 wheels on the Drivers side","Apply sufficient hand-brakes to the front and/or rear. Leave a note in loco log book advising number and location of applied handbrakes"]},{"t":"steps","title":"Unlocking an unattended locomotive / train","items":["Unlock Locomotive doors","Switch engine control switch into RUN","Switch Generator Field switch to ON","Place Reverser from receptacle to control stand","Release Locomotive Park Brake","Release Automatic Brake application","Assistant Driver releases all wagon hand-brakes after Driver has released the train brake application","Remove the softwood chocks","Assistant Driver conducts a continuity test by visually inspecting End of Train Marker brake pipe pressure reading"]}]},{"name":"Light locomotive continuity test \u2014 5000, 5020, 6000 class","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"steps","title":"Light locomotive continuity test procedure","items":["Driver: Lead cab, spring park brake and Independent applied, Lead-Cut In, Automatic released, Gen Field switch open, reverser centred","Assistant Driver: When instructed, go to rearmost cab. Visually check all brake pistons (where fitted) are extended","Driver: Observe gauges \u2014 MR 750-850 kPa, BP and ER 500 kPa, BC approximately 560 kPa","Assistant Driver: Observe trailing loco \u2014 MR 750-850 kPa, BP 500 kPa, ER zero, BC approx 560 kPa. Advise Driver when in position","Driver: Move the Independent Brake handle to Release. Gauges: BP 500 kPa, BC zero","Assistant Driver: When BC drops to zero, open the emergency cock for 15 seconds then close it. BP drops to zero, BC rises to approx 350 kPa","Driver: Observes BP drop to zero and BC rise to approx 350 kPa (Penalty application)","Driver: Follow instruction on screen to clear penalty. BC drops to zero, BP rises to 500 kPa","Assistant Driver: Notes the clearing of the penalty","Driver: Make a full service application. BP drops to approx 350 kPa, BC rises to approx 350 kPa","Assistant Driver: Notes the BP drop and BC rise","Driver: Bail off the Independent Brake and ask the Assistant Driver to visually check all locomotive brakes have released","Assistant Driver: Notes BC drop to zero. Checks all locomotive brakes released. Returns to lead cab","Driver: Reapply Independent Brake and release Automatic Brake. BP rises to 500kpa, BC rises to 560kpa"]}]},{"name":"SPAD prevention \u2014 plan to be SPAD free","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"Primary defence \u2014 signal 158","content":"Use signal 158 (the distant before the home at Hexham) as your #1 SPAD defence on the loaded run into port.\n\nAlways plan your approach to every signal with the possibility it may be at STOP. Know your braking distances for loaded and empty trains on all grades in the Hunter Valley."},{"t":"text","title":"Braking distance reminders","content":"Loaded coal train at 80 km/h on flat: ~1.0\u20131.2 km to stop.\nLoaded coal train at 80 km/h on a descending grade: longer \u2014 plan early.\nEmpty train at 80 km/h: shorter, but do not rely on it being quick.\n\nAlways apply power reductions before the braking point \u2014 don't wait for the signal to come into sight before thinking about stopping."},{"t":"text","title":"SPAD risk locations to know","content":"Approaching Hexham from UP direction \u2014 signals come quickly after a curve.\nApproaching Maitland from UP direction \u2014 multiple signals close together.\nApproaching Singleton from either direction \u2014 busy signalled area.\nAny location where you have been running in CAUTION for multiple signals and the next one clears unexpectedly late."},{"t":"steps","title":"Mental checklist approaching every home signal","items":["Know the signal number and km peg before you get there","Identify the controller \u2014 know who you'd call if it stays at STOP","Ask: if this goes to STOP now, can I stop? If no \u2014 start braking earlier","Check your speed is within the approach speed for that signal type","After passing \u2014 confirm it showed the right indication and log it mentally"]},{"t":"note","content":"If you pass a signal at STOP: stop immediately, tell the NCO, do not move until authorised. Record the time and signal number. This is non-negotiable under ANSG 608."}]},{"name":"Hot axle cheat sheet","type":"field","source":"NSW Pocket Field Guide","sections":[{"t":"text","title":"Axle numbering","content":"On a 2-loco DP consist the axles number from the front of the lead locomotive:\n1st loco: Axles 1\u20136 (bogie 1 = axles 1,2,3 | bogie 2 = axles 4,5,6)\n2nd loco: Axles 7\u201312\n\nHot axle detector readouts reference the axle number from the front of the train."},{"t":"table","title":"Hot axle action summary","headers":["Detector reading","Required action"],"rows":[["WARM","Assess if vehicle can travel and at what speed. Re-inspect per TOC manual. Tell NCO."],["HOT","Stop the train immediately. Tell the NCO. Do not proceed until assessed."],["HOT on locomotive","Stop immediately. Follow ANTR 412 Defective Running Gear procedure."]]},{"t":"steps","title":"On-the-ground inspection steps","items":["Stop the train safely and secure","Tell the NCO the train is stopped, give location and axle number","Walk to the affected vehicle \u2014 note wagon number and axle position","Check for: smoke, burning smell, seized bearing, discolouration of the wheel","Feel for heat radiating from the axle box \u2014 do not touch directly","Report your findings to the NCO","Do not proceed until the NCO gives authority and conditions for travel"]},{"t":"note","content":"A hot axle box can be caused by: failed bearing, brake binding/dragging brakes, or wheel damage. Always check the brake application on the affected vehicle when inspecting."}]},{"name":"Drug & alcohol \u2014 rules and obligations","type":"field","source":"Aurizon policy / Rail Safety National Law","sections":[{"t":"table","title":"Alcohol limits \u2014 safety-critical rail workers","headers":["Standard","Limit"],"rows":[["Blood Alcohol Concentration","Zero (0.00)"],["Breath test result","0.00 g/210L \u2014 zero tolerance"]]},{"t":"text","title":"Fitness for duty","content":"You must not begin or continue a shift if impaired by alcohol, drugs (including prescribed medications that affect performance), fatigue, illness or injury. This is a legal obligation under Rail Safety National Law."},{"t":"text","title":"Prescribed medications","content":"Declare to your employer any prescribed medication that could affect your ability to safely perform safety-critical duties. If in doubt, consult your treating doctor AND Aurizon Health before commencing duty."},{"t":"text","title":"When testing occurs","content":"Random testing: at any time, any location on the network.\nFor-cause testing triggered by:\n\u2022 Any incident or near-miss\n\u2022 Supervisor has reasonable grounds to suspect impairment\n\u2022 Return to work following a drug or alcohol incident"},{"t":"warn","content":"Refusing a drug or alcohol test is treated the same as a positive result. You must comply immediately when requested."},{"t":"text","title":"Reporting obligations","content":"Report immediately to your supervisor if:\n\u2022 You believe you may be impaired\n\u2022 You are taking medication that may affect your performance\n\u2022 You become aware that a workmate may be impaired"},{"t":"note","content":"Rail Safety National Law (RSNL) obligations apply across the entire ARTC network and are in addition to any Aurizon enterprise agreement or company policy requirements."}]},{"name":"Fatigue management \u2014 rules and obligations","type":"field","source":"Aurizon / Rail Safety National Law","sections":[{"t":"text","title":"What is fatigue","content":"Fatigue is mental or physical exhaustion that reduces your ability to perform work safely. It is caused by inadequate sleep, extended waking hours, circadian disruption from shiftwork, and accumulated sleep debt."},{"t":"text","title":"Your legal obligations","content":"You must not begin or continue a shift if you are too fatigued to work safely. You have a duty under Rail Safety National Law to manage your own fatigue \u2014 this includes getting adequate sleep before a shift and following your rostered hours of work and rest."},{"t":"table","title":"Key fatigue parameters (Aurizon Coal NSW \u2014 indicative)","headers":["Parameter","Limit"],"rows":[["Maximum shift length","12 hours standard. Extended shifts up to 14\u202fhrs under specific conditions"],["Minimum break between shifts","10 hours. Check your enterprise agreement"],["Meal break","As per your enterprise agreement"],["Night shift limits","Refer to your fatigue risk management plan and enterprise agreement"]]},{"t":"steps","title":"If you are too fatigued to continue safely","items":["Pull up at the first safe location and secure the train","Tell the Network Control Officer you are stopping due to fatigue","Contact your Train Crew Coordinator / supervisor immediately","Do not continue driving until you have rested and been cleared to do so","Do not be pressured to continue \u2014 fatigue refusals are legally protected"]},{"t":"warn","content":"Driving while fatigued is a safety-critical failure and potentially a criminal offence under Rail Safety National Law. Speak up before you reach the point of being unable to continue safely."},{"t":"note","content":"Keep your personal fatigue record accurate. If called in for an unplanned shift, check your hours and recent sleep before accepting. You have the right to decline work if you cannot meet fitness for duty requirements."}]}],
"workontrack":[
{"name":"ANWT 300 — Planning Work in the Rail Corridor","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT_300_I-3_Rev-1.pdf","version":"3.1","sections":[{"t":"text","title":"Purpose","content":"Prescribes requirements for planning work in the ARTC NSW rail corridor. Covers safe work method statements, work protection planning, and coordination with Network Control before any track work begins."},{"t":"note","content":"All work in the rail corridor must be planned in accordance with this rule. Drivers must be aware that workers may be present and act on any worksite warning or hand signal immediately."}]},
{"name":"ANWT 302 — Local Possession Authority","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT-302-Local-Possession-Authority-I3-Rev-2.pdf","version":"3.2","sections":[{"t":"text","title":"Purpose","content":"Governs the issue and use of a Local Possession Authority (LPA) — the authority that gives a worksite supervisor exclusive use of a section of track. Rail traffic must not enter an LPA section without the Protection Officer's permission."},{"t":"warn","content":"If told a section is under LPA: do NOT enter until the NCO confirms the LPA has been relinquished and the section is clear."}]},
{"name":"ANWT 304 — Track Occupancy Authority","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT-304-Track-Occupancy-Authority-I4-Rev-2.pdf","version":"4.2","sections":[{"t":"text","title":"Purpose","content":"Governs the Track Occupancy Authority (TOA) — used when a worksite needs a section of track that may be occupied by rail traffic in a controlled manner. The NCO issues the TOA after consulting with all relevant parties."},{"t":"note","content":"As a driver: if you receive advice of a TOA in your section, comply with all speed and movement restrictions advised by the NCO."}]},
{"name":"ANWT 306 — Track Work Authority","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT_306_I-2_Rev-1.pdf","version":"2.1","sections":[{"t":"text","title":"Purpose","content":"Covers the Track Work Authority (TWA) — used for minor maintenance work where rail traffic continues to run. Drivers must observe reduced speeds and be prepared to stop when passing active worksites under a TWA."}]},
{"name":"ANWT 308 — Absolute Signal Blocking","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT_308_I-2_Rev-1.pdf","version":"2.1","sections":[{"t":"text","title":"Purpose","content":"Governs the use of absolute signal blocking to protect worksites — signals are held at STOP to prevent rail traffic entering a work section. Drivers must treat a blocked signal as STOP and obtain authority from the NCO before proceeding."},{"t":"warn","content":"A signal blocked for track work purposes must NEVER be passed without verbal authority from the NCO, even if the block is lifted and the signal clears — confirm with the NCO first."}]},
{"name":"ANWT 310 — Lookout Working","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT_310_Lookout_Working_I-2_Rev-2.pdf","version":"2.2","sections":[{"t":"text","title":"Purpose","content":"Governs Lookout Working — the protection method where a lookout warns workers of approaching trains. Rail traffic must proceed at reduced speed (typically 20 km/h or as advised by the NCO) through lookout working sections."},{"t":"note","content":"As a driver: if advised of lookout working ahead, reduce to the speed instructed by the NCO. Sound the whistle on approach. Be prepared to stop."}]},
{"name":"ANWT 312 — Infrastructure Booking Advice","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT_312_I-2_Rev-1.pdf","version":"2.1","sections":[{"t":"text","title":"Purpose","content":"Covers the Infrastructure Booking Advice (IBA) — used to book infrastructure (loops, sidings, crossing facilities) out of use for maintenance. Drivers must not use booked-out infrastructure without NCO authority."}]},
{"name":"ANWT 314 — Work Trains","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT-314-Work-Trains-I2-Rev1.pdf","version":"2.1","sections":[{"t":"text","title":"Purpose","content":"Governs operation of work trains on the ARTC network — ballast trains, rail trains, machinery trains. Work trains may operate under special conditions including reduced speeds and specific authority types. Drivers of revenue trains must be aware work trains may be stationary in sections."}]},
{"name":"ANWT 316 — Track Vehicles","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT_316_Track_Vehicles_I3_Rev2.pdf","version":"3.2","sections":[{"t":"text","title":"Purpose","content":"Covers on-track road-rail vehicles and other track vehicles operating on the ARTC network. Track vehicles may be present in sections under TOA, LPA or TWA. Drivers must treat any section with track vehicles as occupied until cleared by NCO."}]},
{"name":"ANWT 318 — Work Affecting Traction Return Currents or Track Circuits","type":"artc","source":"ARTC NSW Work on Track","url":"https://www.artc.com.au/uploads/ANWT-318.pdf","version":"2.0","sections":[{"t":"note","content":"Covers maintenance work that may temporarily affect track circuit detection or traction return paths. During such work, drivers may receive unusual signal indications. Always report unexpected signal behaviour to the NCO immediately."}]}
],
"safeworking":[
{"name":"ANSY 500 — Rail Vehicle Detection System","type":"artc","source":"ARTC NSW Safeworking Systems","url":"https://www.artc.com.au/uploads/ANSY-500.pdf","version":"2.0","sections":[{"t":"text","title":"Purpose","content":"Describes how train detection (track circuits, axle counters) works on the ARTC NSW network. Train detection underpins signal operation — if a track circuit fails to detect your train, the signals protecting your section may not respond correctly."},{"t":"warn","content":"If you suspect your train has not been detected (e.g. a signal fails to respond after you have clearly occupied the section), report to the NCO immediately."}]},
{"name":"ANSY 502 — Train Order System","type":"artc","source":"ARTC NSW Safeworking Systems","url":"https://www.artc.com.au/uploads/ANSY-502-Train-Order-System-I3-Rev1.pdf","version":"3.1","sections":[{"t":"text","title":"Purpose","content":"Governs Train Order Working (TOW) — the safeworking system used on unsignalled single-line sections of the Hunter Valley and Gunnedah Basin. Under TOW, the NCO issues Train Orders verbally to authorise movement through each block."},{"t":"table","title":"Train Order — driver actions","headers":["Step","Action"],"rows":[["1","Receive Train Order from NCO — repeat back number, limits, conditions"],["2","Record in train journal — block limits and time issued"],["3","Proceed only to the limit specified in the Train Order"],["4","On arrival at block limit, advise NCO you have cleared the section"],["5","Do not enter next block until a new Train Order is received"]]}]},
{"name":"ANSY 514 — Special Proceed Authority (SPA)","type":"artc","source":"ARTC NSW Safeworking Systems","url":"https://www.artc.com.au/uploads/ANSY-514-Special-Proceed-Authority-I2-Rev1.pdf","version":"2.1","sections":[{"t":"text","title":"Purpose","content":"Governs the Special Proceed Authority (SPA) — issued by the NCO to authorise a train to pass a signal that is at STOP and cannot be cleared normally (e.g. due to a fault). SPA is also used at specific designated SPA signals."},{"t":"steps","title":"SPA — driver actions","items":["Contact NCO and advise signal number and reason you require authority","NCO will issue SPA — record SPA number in train journal","Repeat SPA back to NCO including limits of authority","Pass signal at STOP only after SPA is confirmed — proceed at restricted speed","Advise NCO when you have passed the signal and cleared the section"]},{"t":"warn","content":"SPA is not a routine authority. Never request an SPA simply because a signal is slow to clear — wait and contact the NCO as per ANSG 608."}]},
{"name":"ANSY 506 — Staff and Ticket System","type":"artc","source":"ARTC NSW Safeworking Systems","url":"https://www.artc.com.au/uploads/ANSY-506.pdf","version":"4.0","sections":[{"t":"note","content":"Covers the Staff and Ticket safeworking system used on some remote single-line sections. Not commonly used on Hunter Valley coal routes — included for completeness. Refer to NIBs for which sections operate under Staff and Ticket."}]},
{"name":"ANSY 512 — Manual Block Working","type":"artc","source":"ARTC NSW Safeworking Systems","url":"https://www.artc.com.au/uploads/ANSY-512.pdf","version":"2.0","sections":[{"t":"note","content":"Governs Manual Block Working — a contingency safeworking system activated when normal signalling fails. Under Manual Block, the NCO issues authorities verbally section by section. Drivers must comply with all NCO instructions and operate at restricted speed unless otherwise authorised."}]},
{"name":"ANSY 518 — Suspending a System of Safeworking","type":"artc","source":"ARTC NSW Safeworking Systems","url":"https://www.artc.com.au/uploads/ANSY-518.pdf","version":"2.0","sections":[{"t":"note","content":"Covers circumstances where the normal safeworking system is suspended (e.g. total signalling failure over a wide area). An alternative safeworking system will be activated by the NCO. Drivers must follow all NCO instructions and not proceed without explicit authority during a safeworking suspension."}]}
],
"forms":[
{"name":"ANRF 000 — General Information about Network Forms","type":"artc","source":"ARTC NSW Safeworking Forms","url":"https://www.artc.com.au/uploads/ANRF-000.pdf","version":"2.0","sections":[{"t":"text","title":"Purpose","content":"Explains how ARTC network forms are used, controlled, and when they apply. All forms on this page are controlled documents — always use the current version from the ARTC website."}]},
{"name":"ANRF 001 — Local Possession Authority (LPA)","type":"artc","source":"ARTC NSW Safeworking Forms","url":"https://www.artc.com.au/uploads/ANRF-001-LPA-I1-Rev0.pdf","version":"1.0","sections":[{"t":"text","title":"What is this form","content":"The LPA form is issued by the NCO to the Protection Officer to formally record the limits and conditions of a Local Possession Authority. As a driver, you will not fill this form — but understanding it helps you respond correctly when an LPA is in place for a section of track you are about to enter."}]},
{"name":"ANRF 002 — Track Occupancy Authority (TOA)","type":"artc","source":"ARTC NSW Safeworking Forms","url":"https://www.artc.com.au/uploads/ANRF-002-TOA-I2-R1.pdf","version":"2.1","sections":[{"t":"text","title":"What is this form","content":"The TOA form records the authority for a worksite to occupy a track section while rail traffic continues to operate under controlled conditions. The NCO manages the TOA and may instruct you to hold at a signal while the TOA is active."}]},
{"name":"ANRF 004 — Condition Affecting Network (CAN)","type":"artc","source":"ARTC NSW Safeworking Forms","url":"https://www.artc.com.au/uploads/ANRF_004_I-2_Rev-1.pdf","version":"2.1","sections":[{"t":"text","title":"What is this form","content":"A CAN is issued when a condition (infrastructure fault, debris, obstruction) is affecting or may affect safe train operations. The NCO uses the CAN form to record and manage the condition. As a driver, you must respond to any CAN-related speed restriction or movement restriction as instructed by the NCO."},{"t":"note","content":"If you observe a CAN condition (broken rail, subsidence, obstruction), report it to the NCO immediately per ANGE 206."}]},
{"name":"ANRF 005 — Special Proceed Authority (SPA)","type":"artc","source":"ARTC NSW Safeworking Forms","url":"https://www.artc.com.au/uploads/ANRF-005.pdf","version":"2.1","sections":[{"t":"text","title":"What is this form","content":"The SPA form is the written record of a Special Proceed Authority. In practice on the Hunter Valley, SPAs are usually issued verbally by the NCO. The driver must record the SPA number, the signal number, and the limits in their train journal."},{"t":"table","title":"What to record when receiving an SPA","headers":["Item","Details"],"rows":[["SPA number","Issued by NCO — record in train journal"],["Signal number","The signal you are authorised to pass"],["Limits","Where your authority ends — do not exceed"],["Time","Time SPA was issued"],["NCO name","Name of the controller who issued the SPA"]]}]},
{"name":"ANRF 009 — Train Order","type":"artc","source":"ARTC NSW Safeworking Forms","url":"https://www.artc.com.au/uploads/ANRF-009-Train-Order-TMACS-I2-Rev1.pdf","version":"3.1","sections":[{"t":"text","title":"What is this form","content":"The Train Order form records the authority for a train movement through a block section in Train Order Working territory. Used on unsignalled sections of the Gunnedah Basin (Werris Creek north) and some Hunter Valley branch lines."},{"t":"note","content":"On the Gunnedah Basin run north of Werris Creek you will be operating under Train Order Working. Always record Train Order details in your journal before proceeding."}]},
{"name":"ANRF 011 — Worksite Warning","type":"artc","source":"ARTC NSW Safeworking Forms","url":"https://www.artc.com.au/uploads/ANRF-011.pdf","version":"2.0","sections":[{"t":"text","title":"What is this form","content":"The Worksite Warning is issued to train crews to formally advise them of a worksite ahead, its location, and any speed restrictions or operating conditions that apply. You may receive a Worksite Warning from the NCO before entering a section where track work is occurring."}]},
{"name":"ANRF 012 — Checklist for Unsignalled Movement Within Yard Limits","type":"artc","source":"ARTC NSW Safeworking Forms","url":"https://www.artc.com.au/uploads/ANRF012_-I-2_-Rev-0-1.pdf","version":"2.0","sections":[{"t":"text","title":"What is this form","content":"Used when making an unsignalled movement within yard limits — such as at mine sites, port facilities, or yard areas not covered by fixed signals. The checklist ensures points are correctly set and the route is clear before proceeding."},{"t":"note","content":"Relevant at Port Waratah, Kooragang, and at mine sites when working in non-track circuited areas."}]}
],

{"name":"OGW-30-16 — Middle Hunter NIB","type":"artc","source":"ARTC Hunter Valley NIB","url":"https://www.artc.com.au/uploads/OGW-30-16_Book.pdf","version":"Jun 2025","sections":[{"t":"text","title":"Coverage","content":"Allandale (inclusive) to Singleton (inclusive), plus Mt Thorley, Bulga, and Wambo branch lines. Covers Allandale, Branxton, Greta, Lochinvar, Whittingham, Minimbah, Singleton — all under Middle Hunter Control."},{"t":"table","title":"Key reference documents","headers":["Document","Link"],"rows":[["NIB Book (OGW-30-16)","artc.com.au/uploads/OGW-30-16_Book.pdf"],["NIB Diagrams","artc.com.au/uploads/OGW-30-16_NIB_diagrams.pdf"],["Line Diagram","artc.com.au/uploads/OGW-30-16_Diagram.pdf"]]},{"t":"note","content":"Updated Jun 2025. Contains Wambo/Mt Thorley branch configurations, Branxton loop details, Singleton yard layout, and Minimbah ruling grade locations."}]},

  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderDrawer();
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function renderDrawer(){
  var q = document.getElementById('search-input').value.toLowerCase();
  var h = '<div class="dr-section">Main</div>';
  h += '<div class="dr-item'+(S.page==='home'?' active':'')+'" onclick="showHome()">';

  h += '<div class="dr-section">Quick access</div>';

  h += '<div class="dr-item" onclick="showPortSignals()"><div class="dr-dot" style="background:#0277BD"></div><div class="dr-label">Signal Reference \u2014 Port Terminals</div><span class="dr-count" style="background:#E3F2FD;color:#0277BD">47</span></div>';

    var active = S.page!=='home' && S.catId===c.id;

         '<div class="dr-label">'+c.name+'</div>'+

  });

}

function homeSearchLive(q){
  // When user types, open search with query pre-filled
  if(q && q.length >= 2){
    showSearch();
    var el = document.getElementById('ls');
    if(el){ el.value = q; runSearch(); }
  }
}

function showCat(id){
  S.page='cat';
  updateTabBar('docs');
  S.catId=id; S.docIdx=null;
  var cat = getCat(id);
  document.getElementById('hdr-title').textContent = cat.name;
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page-cat').classList.add('active');
  renderCat(id);
  renderDrawer();
  closeDrawer();
}

  var cat = getCat(id), docs = allDocs(id);
  var h = '';
  if(S.pending) h += renderConfirm();
  h += '<div class="cat-hdr"><div class="cat-hdot" style="background:'+cat.color+'"></div>'+
       '<div class="cat-hname">'+cat.name+'</div></div>';
  if(S.editMode){
    h += '<div class="edit-toolbar">';
    h += '<button class="etb-btn" onclick="showEditCat(\''+id+'\')">Edit category</button>';
    h += '<button class="etb-btn etb-accent" onclick="showAddDoc(\''+id+'\')">+ Add document</button>';

    h += '<div class="route-feature-title">Main North \u2014 Newcastle \u2194 Muswellbrook</div>';
    h += '<div class="route-feature-sub">Full Up & Down methodology \u2014 driving notches, signals, grade profiles, loops and sidings for DP consists</div>';
    h += '<div class="route-stats">';
    h += '<div class="route-stat"><div class="route-stat-v">135 km</div><div class="route-stat-l">Distance</div></div>';
    h += '<div class="route-stat"><div class="route-stat-v">28</div><div class="route-stat-l">Sections</div></div>';
    h += '<div class="route-stat"><div class="route-stat-v">176</div><div class="route-stat-l">Signals</div></div>';
    h += '</div>';
    h += '<div class="route-btns">';
    h += '<a class="route-btn" onclick="openRouteFile(\'up\')" style="background:#2E7D32;cursor:pointer">UP \u2014 Loaded to port</a>';
    h += '<a class="route-btn" onclick="openRouteFile(\'down\')" style="background:#1565C0;cursor:pointer">DOWN \u2014 Empty to mines</a>';
    h += '</div>';
    h += '<div class="route-btns" style="margin-top:6px">';
    h += '<button class="route-btn" onclick="showSignals()" style="background:#6A1B9A;border:none;cursor:pointer">Signal reference \u2014 176 signals</button>';
    h += '</div></div>';

function showDoc(catId,idx){
  S.page='doc';
  updateTabBar('docs');
  S.catId=catId; S.docIdx=idx;
  var doc = allDocs(catId)[idx];
  document.getElementById('hdr-title').textContent = doc.name.length>30 ? doc.name.substring(0,28)+'\u2026' : doc.name;
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page-doc').classList.add('active');
  renderDoc(catId,idx);
  closeDrawer();
  window.scrollTo(0,0);
}

function renderDoc(catId,idx){
  var cat=getCat(catId), doc=allDocs(catId)[idx];
  var b = doc.type;
  var h = '<div class="back-btn" onclick="showCat(\''+catId+'\')">\u2039 '+cat.name+'</div>';
  if(S.editMode){
    h += '<div class="edit-toolbar">';
    h += '<button class="etb-btn" onclick="showEdit(\''+catId+'\','+idx+')">Edit document</button>';
    h += '<button class="etb-btn" onclick="duplicateDoc(\''+catId+'\','+idx+')">Duplicate</button>';
    var isExtra = idx >= (DB[catId]||[]).length;
    if(isExtra) h += '<button class="etb-btn etb-danger" onclick="deleteDoc(\''+catId+'\','+idx+')">Delete</button>';
    h += '</div>';
  }
  h += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">';
  h += '<div class="doc-title" style="flex:1">'+doc.name+'</div>';
  var favd = isFav(catId,idx);
  h += '<button class="fav-btn" onclick="toggleFav(\''+catId+'\','+idx+')" style="touch-action:manipulation">'+(favd?SVG.star_f:SVG.star_e)+'</button>';
  h += '</div>';
  h += '<div class="doc-meta"><span class="badge b-'+b+'">'+(b==='artc'?'ARTC':b==='field'?'Field Guide':b.toUpperCase())+'</span>';
  if(doc.version) h += '<span class="doc-ver">v'+doc.version+'</span>';
  h += '<span style="font-size:12px;color:#888">'+doc.source+'</span></div>';
  if(doc.url){
    h += '<div class="src-bar"><div><div class="src-lbl">Official source</div>'+
         '<div class="src-name">ARTC website \u2014 live controlled version</div></div>'+
         '<button class="src-btn" onclick="openPDF(\''+doc.url+'\')">Open PDF</button></div>';
  }
  var hasSteps = (doc.sections||[]).some(function(s){ return s.t==='steps'; });
  if(hasSteps){
    h += '<button class="reset-btn" onclick="resetSteps(\''+catId+'\','+idx+')" style="margin-bottom:10px">Reset all steps</button>';
  }
  (doc.sections||[]).forEach(function(sec,si){
    h += '<div class="sec-block">';
    if(sec.t==='text'){
      if(sec.title) h += '<div class="sec-title">'+sec.title+'</div>';
      h += '<div class="sec-text">'+escHtml(sec.content||'').replace(/\n/g,'<br>')+'</div>';
    } else if(sec.t==='note'){
      h += '<div class="note"><div class="note-lbl">Note</div><div class="note-text">'+escHtml(sec.content||'').replace(/\n/g,'<br>')+'</div></div>';
    } else if(sec.t==='warn'){
      h += '<div class="warn"><div class="warn-lbl">Warning</div><div class="warn-text">'+escHtml(sec.content||'').replace(/\n/g,'<br>')+'</div></div>';
    } else if(sec.t==='caut'){
      h += '<div class="caut"><div class="caut-lbl">Caution</div><div class="caut-text">'+escHtml(sec.content||'').replace(/\n/g,'<br>')+'</div></div>';
    } else if(sec.t==='steps'){
      if(sec.title) h += '<div class="sec-title">'+sec.title+'</div>';
      (sec.items||[]).forEach(function(step,k){
        var key=catId+'_'+idx+'_'+si+'_'+k;
        var done=!!(S.checked&&S.checked[key]);
        h += '<div class="step'+(done?' done':'')+'\" onclick="toggleStep(\''+key+'\')\">';
        h += '<div class="step-cb">'+(done?'\u2713':'')+'</div>';
        h += '<div class="step-text">'+escHtml(step)+'</div></div>';
      });
    } else if(sec.t==='table'){
      if(sec.title) h += '<div class="sec-title">'+sec.title+'</div>';
      h += '<div class="tbl-wrap"><table class="tbl">';
      if(sec.headers&&sec.headers.length){
        h += '<thead><tr>'+sec.headers.map(function(hd){ return '<th>'+escHtml(hd)+'</th>'; }).join('')+'</tr></thead>';
      }
      if(sec.rows&&sec.rows.length){
        h += '<tbody>'+sec.rows.map(function(row){
          return '<tr>'+row.map(function(cell){ return '<td>'+escHtml(cell)+'</td>'; }).join('')+'</tr>';
        }).join('')+'</tbody>';
      }
      h += '</table></div>';
    }
    h += '</div>';
  });
  document.getElementById('page-doc').innerHTML = h;
}

function toggleStep(key){
  S.checked[key] = !S.checked[key];
  if(S.page==='doc' && S.catId && S.docIdx!==null) renderDoc(S.catId, S.docIdx);
}
function resetSteps(catId,idx){
  var doc = allDocs(catId)[idx];
  (doc.sections||[]).forEach(function(sec,si){
    (sec.items||[]).forEach(function(item,ii){
      delete S.checked[catId+'_'+idx+'_'+si+'_'+ii];
    });
  });
  renderDoc(catId,idx);
}

function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function uploadArea(){
  return '<div class="upload-area" onclick="document.getElementById(\'file-input\').click()">'+
    '<div class="upload-icon"></div>'+
    '<div class="upload-title">Upload a document</div>'+
    '<div class="upload-sub">PDF, Word or image \u2022 Claude reads & formats it automatically</div>'+
    '</div>';
}

function openRouteFile(dir){
  // Try to open sibling file in new tab — works when saved locally
  var base = window.location.href;
  if(base.indexOf('blob:')===0||base.indexOf('file:')===0||base.indexOf('http')===0){
    // Extract directory
    var slash = base.lastIndexOf('/');
    var dir_base = slash>=0 ? base.substring(0,slash+1) : '';
    var url = dir_base + 'route_' + dir + '.html';
    var w = window.open(url,'_blank');
    if(!w){
      alert('Pop-ups may be blocked. Please allow pop-ups for this page and try again, or save all three HTML files to the same folder and open from Files.');
    }
  } else {
    alert('Save all three files (aurizon_field_guide.html, route_up.html, route_down.html) to the same folder on your device, then open from there.');
  }
}

function escKey(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// \u2500\u2500 SEARCH \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function showSearch(){
  S.page='search';
  updateTabBar('search');
  document.getElementById('hdr-title').textContent = 'Search';
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page-doc').classList.add('active');
  var h = '<div class="search-bar">';
  h += '<div class="search-wrap"><span style="font-size:16px;color:#aaa"></span>';
  h += '<input id="ls" type="text" placeholder="Search docs or signal number..." oninput="runSearch()" autofocus>';
  h += '<span class="search-clear" onclick="document.getElementById(\'ls\').value=\'\';runSearch()">×</span></div></div>';
  h += '<div id="sr" class="search-results"><div class="search-empty">Start typing to search\u2026</div></div>';
  document.getElementById('page-doc').innerHTML = h;
  closeDrawer();
  setTimeout(function(){ var e=document.getElementById('ls'); if(e) e.focus(); }, 80);
}

function runSearch(){
  var el = document.getElementById('ls');
  var q = el ? el.value.trim() : '';
  var ql = q.toLowerCase();
  var sr = document.getElementById('sr');
  if(!q || q.length < 2){
    sr.innerHTML = '<div class="search-empty">Start typing to search\u2026</div>';
    return;
  }

  // Signal number detection
  var sigPat = /^([a-z]{1,4}[\s\-]?\d[\d\.\s]*|[\d]{3}[\.\d]*)/i;
  var looksLikeSig = sigPat.test(q.trim()) || ql.indexOf('signal')>=0;

  var sigResults = [];
  if(looksLikeSig){
    SIG_UP.forEach(function(s){
      if(s[0].toLowerCase().indexOf(ql)>=0 || s[1].toLowerCase().indexOf(ql)>=0)
        sigResults.push({dir:'up', sig:s});
    });
    SIG_DOWN.forEach(function(s){
      if(s[0].toLowerCase().indexOf(ql)>=0 || s[1].toLowerCase().indexOf(ql)>=0)
        sigResults.push({dir:'down', sig:s});
    });
    PORT_SIGS.forEach(function(area,ai){
      area[3].forEach(function(s){
        if(s[1].toLowerCase().indexOf(ql)>=0 || s[5].toLowerCase().indexOf(ql)>=0)
          sigResults.push({dir:'port', area:ai, sig:s, areaName:area[0]});
      });
    });
  }

  // Doc search
  var docResults = [];
  CATS.forEach(function(cat){
    allDocs(cat.id).forEach(function(doc,idx){
      var nameMatch = doc.name.toLowerCase().indexOf(ql) >= 0;
      var snippet = '';
      (doc.sections||[]).forEach(function(sec){
        if(snippet) return;
        var haystack = (sec.content||'') + ' ' + (sec.title||'');
        (sec.items||[]).forEach(function(it){ haystack += ' '+it; });
        (sec.rows||[]).forEach(function(r){ haystack += ' '+r.join(' '); });
        var ci = haystack.toLowerCase().indexOf(ql);
        if(ci >= 0){
          var raw = haystack.substring(Math.max(0,ci-25), ci+60);
          var lo = raw.toLowerCase().indexOf(ql);
          snippet = '\u2026' + escHtml(raw.substring(0,lo)) +
            '<mark style="background:#FFF176;border-radius:2px;padding:0 1px">' +
            escHtml(raw.substring(lo,lo+q.length)) + '</mark>' +
            escHtml(raw.substring(lo+q.length)) + '\u2026';
        }
      });
      if(nameMatch || snippet) docResults.push({cat:cat,idx:idx,doc:doc,snippet:snippet});
    });
  });

  var h = '';

  // Signal results at top
  if(sigResults.length){
    h += '<div style="padding:4px 0 8px">';
    h += '<div style="font-size:11px;font-weight:700;color:#7B1FA2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Signals ('+sigResults.length+')</div>';
    sigResults.slice(0,12).forEach(function(r){
      var s = r.sig;
      var ctrl = SIG_CTRL[s[3]] || {name:s[3], color:'#888'};
      var dotColor = s[4]==='auto'?'#2E7D32':s[4]==='spa'?'#4527A0':'#E65100';
      var dirLabel = r.dir==='up'?'<span style="color:#E65100">UP</span>':
                     r.dir==='down'?'<span style="color:#1565C0">DOWN</span>':
                     '<span style="color:#7B1FA2"> Port</span>';
      // Clicking a signal: open signal ref, set direction, filter to that signal
      var onclick = r.dir==='port'
        ? 'showPortSignals();portSigFilterAndOpen(\''+escKey(s[1])+'\')'
        : 'sigSetDir(\''+r.dir+'\');showSignals();sigFilterAndOpen(\''+escKey(s[1])+'\')';
      h += '<div class="sr-item" onclick="'+onclick+'" style="touch-action:manipulation">';
      h += '<div style="width:10px;height:10px;border-radius:50%;background:'+dotColor+';flex-shrink:0;margin-top:4px"></div>';
      h += '<div style="flex:1">';
      h += '<div class="sr-name" style="font-weight:600">'+s[1]+'<span style="font-size:11px;color:#888;margin-left:8px;font-weight:400">'+s[0]+' km</span></div>';
      h += '<div class="sr-match">'+dirLabel+' \u2022 <span style="color:'+ctrl.color+';font-weight:600;font-size:11px">'+ctrl.name+'</span>';
      if(s[2]) h += ' \u2022 '+s[2];
      h += '</div></div></div>';
    });
    h += '</div>';
    if(docResults.length) h += '<hr style="border:none;border-top:1px solid #e0e0e0;margin:4px 0 10px">';
  }

  // Doc results
  if(docResults.length){
    if(sigResults.length)
      h += '<div style="font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Documents ('+docResults.length+')</div>';
    docResults.slice(0,40).forEach(function(r){
      h += '<div class="sr-item" style="display:flex;align-items:center;gap:8px;touch-action:manipulation">',
      h += '<span class="sr-cat" style="background:'+r.cat.bg+';color:'+r.cat.tc+';cursor:pointer" onclick="showDoc(\''+ r.cat.id +'\','+r.idx+')">'+r.cat.name.split(' &')[0].split(' /')[0]+'</span>';
      h += '<div style="flex:1;cursor:pointer" onclick="showDoc(\''+ r.cat.id +'\','+r.idx+')">';
      h += '<div class="sr-name">'+r.doc.name+'</div>';
      if(r.snippet) h += '<div class="sr-match">'+r.snippet+'</div>';
      h += '</div>';
      if(S.editMode) h += '<button onclick="showEdit(\''+ r.cat.id +'\','+r.idx+')" class="etb-card-btn">Edit</button>';
      h += '</div>';
    });
    if(docResults.length>40) h += '<div class="search-empty">+'+(docResults.length-40)+' more \u2014 refine search</div>';
  }

  if(!sigResults.length && !docResults.length)
    h = '<div class="search-empty">No results for \u201c'+escHtml(q)+'\u201d</div>';

  sr.innerHTML = h;
}

// Open signal ref and auto-open the matching signal card
function sigFilterAndOpen(sigNum){
  var ql = (sigNum||'').toLowerCase().trim();
  // First expand all zones so cards are in the DOM and visible
  var allBodies = document.querySelectorAll('.sig-zone-body');
  var allArrs   = document.querySelectorAll('.sig-zone-arr');
  allBodies.forEach(function(b){ b.className='sig-zone-body open'; b.style.display='block'; });
  allArrs.forEach(function(a){ a.style.transform='rotate(90deg)'; });
  // Now find the matching card and open + scroll to it
  setTimeout(function(){
    var cards = document.querySelectorAll('.sig-card');
    for(var i=0; i<cards.length; i++){
      var numEl = cards[i].querySelector('.sig-num');
      var kmEl  = cards[i].querySelector('.sig-km');
      var numTxt = numEl ? numEl.textContent.toLowerCase() : '';
      var kmTxt  = kmEl  ? kmEl.textContent.toLowerCase()  : '';
      if(numTxt.indexOf(ql)>=0 || kmTxt.indexOf(ql)>=0){
        cards[i].className = 'sig-card open';
        // Small delay then scroll so layout is settled
        setTimeout(function(card){
          card.scrollIntoView({behavior:'smooth', block:'center'});
        }, 80, cards[i]);
        break;
      }
    }
  }, 150);
}

// \u2500\u2500 DOWNLOAD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function downloadCurrent(){
  var ch = document.documentElement.outerHTML;

  function reserialise(src, startMark, endMark, newVal){
    var s = src.indexOf(startMark);
    if(s<0) return src;
    var e = src.indexOf(endMark, s);
    if(e<0) return src;
    return src.substring(0,s) + newVal + src.substring(e);
  }

  // Re-serialise all user-editable data vars
  ch = reserialise(ch, 'var SIG_UP=',   '\nvar SIG_DOWN=',   'var SIG_UP='+JSON.stringify(SIG_UP));
  ch = reserialise(ch, 'var SIG_DOWN=', '\nvar PORT_SIGS=',  'var SIG_DOWN='+JSON.stringify(SIG_DOWN));
  ch = reserialise(ch, 'var PORT_SIGS=','\nvar HOME_UPDATED','var PORT_SIGS='+JSON.stringify(PORT_SIGS));
  ch = reserialise(ch, 'var DB = {',    '\nvar SIG_UP=',     'var DB = '+JSON.stringify(DB));
  ch = reserialise(ch, 'var CATS = ',   ';\n\nvar DB',       'var CATS = '+JSON.stringify(CATS));
  ch = reserialise(ch, 'var EXTRA = {}','\nvar S = {',       'var EXTRA = {}');

  // Re-serialise EXTRA (user-added docs)
  var exs = ch.indexOf('var EXTRA = {}');
  if(exs>=0){
    var exe = ch.indexOf('\nvar S = {', exs);
    if(exe>=0){
      var extraStr = 'var EXTRA = '+JSON.stringify(EXTRA);
      // Also remove the CATS.forEach that initialises EXTRA (it comes right after)
      var forStart = ch.indexOf('\nCATS.forEach', exs);
      var forEnd   = ch.indexOf(');', forStart) + 2;
      if(forStart>=exs && forStart<exe)
        ch = ch.substring(0,exs) + extraStr + ch.substring(forEnd);
      else
        ch = ch.substring(0,exs) + extraStr + ch.substring(exe);
    }
  }

  // Re-serialise FAVS
  var fvs = ch.indexOf('var FAVS = {');
  if(fvs>=0){
    var fve = ch.indexOf(';', fvs)+1;
    ch = ch.substring(0,fvs) + 'var FAVS = '+JSON.stringify(FAVS) + ch.substring(fve);
  }

  // Re-serialise S (preserves checked steps, editMode, etc)
  var scs = ch.indexOf('var S = {');
  if(scs>=0){
    var sce = ch.indexOf(';\n\nfunction', scs);
    if(sce>=0){
      var sVal = JSON.parse(JSON.stringify(S));
      sVal.page='home'; sVal.editMode=false; // reset to home on reopen
      ch = ch.substring(0,scs) + 'var S = '+JSON.stringify(sVal) + ch.substring(sce);
    }
  }

  var blob = new Blob([ch], {type:'text/html'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'aurizon_field_guide.html'; a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function showEdit(catId,idx){
  var doc = allDocs(catId)[idx], cat = getCat(catId);
  S._editCat=catId; S._editIdx=idx;
  S._editSecs = (doc.sections||[]).map(function(s){ return JSON.parse(JSON.stringify(s)); });
  S.page='doc';
  document.getElementById('hdr-title').textContent = 'Edit';
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page-doc').classList.add('active');

}



function _readEditFields(){
  S._editSecs.forEach(function(sec,si){
    var tEl=document.getElementById('et'+si);
    var cEl=document.getElementById('ec'+si);
    var hEl=document.getElementById('eh'+si);
    if(tEl) sec.title = tEl.value;
    if(cEl){
      if(sec.t==='steps') sec.items = cEl.value.split('\n').filter(function(s){ return s.trim(); });
      else if(sec.t==='table'){
        sec.rows = cEl.value.split('\n').filter(function(s){ return s.trim(); })
          .map(function(row){ return row.split(',').map(function(c){ return c.trim(); }); });
      } else sec.content = cEl.value;
    }
    if(hEl) sec.headers = hEl.value.split(',').map(function(s){ return s.trim(); });
  });
}



function editDelSec(si){
  _readEditFields();
  S._editSecs.splice(si,1);
  renderEdit();
}

function editAddSec(type){
  _readEditFields();
  if(type==='text')  S._editSecs.push({t:'text',title:'New section',content:'Enter content here.'});
  else if(type==='steps') S._editSecs.push({t:'steps',title:'New steps',items:['Step 1','Step 2']});
  else if(type==='note')  S._editSecs.push({t:'note',content:'Enter note here.'});
  else if(type==='warn')  S._editSecs.push({t:'warn',content:'Enter warning here.'});
  else if(type==='caut')  S._editSecs.push({t:'caut',content:'Enter caution here.'});
  else if(type==='table') S._editSecs.push({t:'table',title:'New table',headers:['Column 1','Column 2'],rows:[['Row 1 A','Row 1 B']]});
  renderEdit();
}
