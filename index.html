function sigSetDir(dir){
  SIG_DIR = dir;
}

function renderSignalPage(){
  var sigs = SIG_DIR==='up' ? SIG_UP : SIG_DOWN;
  var upActive = SIG_DIR==='up' ? ' up-active' : '';
  var dnActive = SIG_DIR==='down' ? ' dn-active' : '';

  // Controller km boundaries — based on where controlled signals change hands
  // Automatics between those boundaries belong to that controller
  function getCtrlByKm(km){
    km = parseFloat(km);
    if(km >= 165 && km < 170.5) return 'PW';
    if(km >= 170.5 && km < 197.5) return 'LH';
    if(km >= 197.5 && km < 241.0) return 'MH';
    if(km >= 241.0 && km < 300.0) return 'UH1';
    if(km >= 300.0)                return 'UH2';
    return 'LH'; // fallback
  }

  var CTRL_ORDER = ['PW','LH','MH','UH1','UH2'];
  var CTRL_META = {
    PW:  {name:'Port Waratah Control',  color:'#5F8877', zone:'165–171 km · Waratah to Sandgate'},
    LH:  {name:'Lower Hunter Control',  color:'#5B8FA8', zone:'170–197 km · Sandgate (OGW-30-15) to Maitland'},
    MH:  {name:'Middle Hunter Control', color:'#5D8A6E', zone:'197–241 km · Allandale (OGW-30-16) to Singleton'},
    UH1: {name:'Upper Hunter 1',        color:'#8A7560', zone:'240–300 km · Singleton to Muswellbrook'},
    UH2: {name:'Upper Hunter 2',        color:'#B0625E', zone:'300 km+ · Aberdeen (OGW-30-18) to Werris Creek'},
  };

  var h = '<div class="sig-page-hdr">';
  h += '<div class="sig-page-title">Signal Reference — Main North</div>';
  h += '<div style="font-size:12px;color:var(--c-text3);margin-bottom:10px">Muswellbrook ↔ Newcastle · DP Consist · '+sigs.length+' signals</div>';
  h += '<div class="sig-dir-tabs">';
  h += '<button class="sig-dir-tab'+upActive+'" onclick="sigSetDir(\'up\');renderSignalPage()" style="font-size:13px;font-weight:600">UP — Loaded</button>';
  h += '<button class="sig-dir-tab'+dnActive+'" onclick="sigSetDir(\'down\');renderSignalPage()" style="font-size:13px;font-weight:600">DOWN — Empty</button>';
  h += '<button class="sig-dir-tab" style="flex:0.8;color:#7B1FA2;font-size:12px" onclick="showPortSignals()">Ports</button>';
  h += '</div>';
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 16px">';
  h += '<input id="sig-search" type="text" placeholder="Filter by signal number…" oninput="sigFilter(this.value)" style="flex:1;padding:9px 13px;border-radius:10px;border:1px solid var(--c-border);background:var(--c-bg3);font-size:15px;outline:none;color:var(--c-text);touch-action:manipulation">';
  if(S.editMode) h += '<button onclick="showAddSignal(SIG_DIR)" class="etb-btn etb-accent" style="flex-shrink:0">+ Add signal</button>';
  h += '</div></div>';

  // Group signals by controller — automatics assigned by km
  var grouped = {PW:[],LH:[],MH:[],UH1:[],UH2:[]};
  sigs.forEach(function(s){
    var ctrl = s[3]==='AUTO' ? getCtrlByKm(s[0]) : s[3];
    if(!grouped[ctrl]) grouped[ctrl]=[];
    grouped[ctrl].push({sig:s, ctrl:ctrl});
  });

  CTRL_ORDER.forEach(function(ctrlKey, zi){
    var entries = grouped[ctrlKey];
    if(!entries||!entries.length) return;
    var meta = CTRL_META[ctrlKey];
    var zid = 'sz'+zi;
    var vCount = entries.filter(function(e){return e.sig[4]==='verbal';}).length;
    var aCount = entries.filter(function(e){return e.sig[4]==='auto';}).length;
    var sCount = entries.filter(function(e){return e.sig[4]==='spa';}).length;

    h += '<div class="sig-zone" id="'+zid+'">';
    h += '<div class="sig-zone-hdr" onclick="sigToggleZone(\''+zid+'\')" style="touch-action:manipulation;border-left:4px solid '+meta.color+'">';
    h += '<div style="flex:1">';
    h += '<div class="sig-zone-name" style="color:'+meta.color+'">'+meta.name+'</div>';
    h += '<div style="font-size:11px;color:var(--c-text3);margin-top:2px">'+meta.zone+'</div>';
    h += '<div class="sig-zone-pills" style="margin-top:5px">';
    if(vCount) h += '<span class="sig-zone-pill" style="background:#E65100">'+vCount+' verbal</span>';
    if(aCount) h += '<span class="sig-zone-pill" style="background:#2E7D32">'+aCount+' auto</span>';
    if(sCount) h += '<span class="sig-zone-pill" style="background:#4527A0">'+sCount+' SPA</span>';
    h += '</div></div>';
    h += '<span class="sig-zone-arr" id="'+zid+'-arr">›</span></div>';
    h += '<div class="sig-zone-body" id="'+zid+'-body">';

    // Sort by km within each controller section
    entries.sort(function(a,b){ return parseFloat(a.sig[0])-parseFloat(b.sig[0]); });

    entries.forEach(function(entry,si){
      var s = entry.sig;
      var cid = zid+'-'+si;
      var isAuto = s[4]==='auto';
      var dotColor = isAuto ? '#2E7D32' : s[4]==='spa' ? '#4527A0' : '#E65100';
      var action = '';
      if(isAuto){
        action = 'Permissive signal — may pass at STOP under ANSG 608 if driver judges it safe. Proceed at <strong>restricted speed</strong>.';
      } else if(s[4]==='spa'){
        action = '<strong>Special Proceed Authority (SPA)</strong> required from '+meta.name+'. Do not pass until SPA received.';
      } else {
        var needPts = s[2]&&(s[2].indexOf('Home')>=0||s[2].indexOf('Turnout')>=0||s[2].indexOf('Starter')>=0);
        action = 'Absolute signal — <strong>verbal authority from '+meta.name+'</strong> required.';
        if(needPts) action += ' Confirm <strong>points correctly set</strong>.';
      }
      h += '<div class="sig-card" id="'+cid+'" onclick="sigToggleCard(\''+cid+'\')" style="touch-action:manipulation">';
      h += '<div class="sig-card-hdr">';
      h += '<div class="sig-km">'+s[0]+'</div>';
      h += '<div class="sig-type-dot" style="background:'+dotColor+'"></div>';
      h += '<div class="sig-num">'+s[1]+'</div>';
      h += '<div style="font-size:11px;color:var(--c-text3);flex:1;text-align:right;margin-right:4px">'+(isAuto?'Auto':s[2]||'')+'</div>';
      if(S.editMode) h += '<button onclick="event.stopPropagation();showEditSignalByKm(SIG_DIR,\''+s[0]+'\');" class="etb-card-btn">Edit</button>';
      h += '<span class="sig-card-arr" style="flex-shrink:0">›</span></div>';
      h += '<div class="sig-card-body">';
      h += '<div class="sig-action-box sig-action-'+s[4]+'">'+action+'</div>';
      h += '</div></div>';
    });
    h += '</div></div>';
  });

  document.getElementById('page-signals').innerHTML = h;
}

function sigFilter(q){
  var ql = (q||'').toLowerCase().trim();

  if(!ql){
    document.querySelectorAll('.sig-card').forEach(function(c){ c.style.display=''; c.className='sig-card'; });
    document.querySelectorAll('.sig-zone-body').forEach(function(b){ b.className='sig-zone-body'; b.style.display='none'; });
    document.querySelectorAll('.sig-zone-arr').forEach(function(a){ a.style.transform=''; });
    return;
  }

  document.querySelectorAll('.sig-zone').forEach(function(zone){
    var body = zone.querySelector('.sig-zone-body');
    var arr  = zone.querySelector('.sig-zone-arr');
    if(!body) return;
    var cards = body.querySelectorAll('.sig-card');
    var zoneHasMatch = false;
    cards.forEach(function(card){
      var numEl = card.querySelector('.sig-num');
      var kmEl  = card.querySelector('.sig-km');
      var num   = numEl ? numEl.textContent.toLowerCase() : '';
      var km    = kmEl  ? kmEl.textContent.toLowerCase()  : '';
      var match = num.indexOf(ql)>=0 || km.indexOf(ql)>=0;
      if(match){
        card.style.display = '';
        card.className = 'sig-card open';
        zoneHasMatch = true;
      } else {
        card.style.display = 'none';
        card.className = 'sig-card';
      }
    });
    if(zoneHasMatch){
      body.className = 'sig-zone-body open';
      body.style.display = 'block';
      if(arr) arr.style.transform = 'rotate(90deg)';
    } else {
      body.className = 'sig-zone-body';
      body.style.display = 'none';
      if(arr) arr.style.transform = '';
    }
  });
}

function sigToggleZone(zid){
  var body = document.getElementById(zid+'-body');
  var arr  = document.getElementById(zid+'-arr');
  if(!body) return;
  var open = body.className.indexOf('open')>=0;
  body.className = open ? 'sig-zone-body' : 'sig-zone-body open';
  body.style.display = open ? 'none' : 'block';
  if(arr) arr.style.transform = open ? '' : 'rotate(90deg)';
}

function sigToggleCard(cid){
  var card = document.getElementById(cid);
  if(!card) return;
  var open = card.className.indexOf('open')>=0;
  card.className = open ? 'sig-card' : 'sig-card open';
}

function orgMoveDoc(catId,from,to){
  var docs=allDocs(catId);
  var doc=docs.splice(from,1)[0];
  docs.splice(to,0,doc);
  // Write back split into DB and EXTRA
  var dbOrig=(DB[catId]||[]).length; // original DB length before operation
  // Rebuild: first dbOrig items go to DB, rest to EXTRA
  // Actually simpler: collapse all into EXTRA and clear DB for this cat
  // But that breaks the base docs. Instead, only allow moves within EXTRA.
  // For now: if both from and to are in same array, move within that array
  var dbLen=(DB[catId]||[]).length;
  if(from<dbLen && to<dbLen){
    var d=DB[catId]; var item=d.splice(from,1)[0]; d.splice(to,0,item);
  } else if(from>=dbLen && to>=dbLen){
    var e=EXTRA[catId]||[]; var fi=from-dbLen; var ti=to-dbLen;
    var item=e.splice(fi,1)[0]; e.splice(ti,0,item);
  }
  // Cross-array moves not supported (would mutate DB structure)
  renderOrganise();
}
function orgDeleteDoc(catId,idx){
  var docs=allDocs(catId);
  var doc=docs[idx];
  if(!confirm('Delete "'+doc.name+'"?'))return;
  var dbLen=(DB[catId]||[]).length;
  if(idx<dbLen){ DB[catId].splice(idx,1); }
  else { if(EXTRA[catId]) EXTRA[catId].splice(idx-dbLen,1); }
  renderOrganise();
}
function orgFilterCat(id){ORG.catFilter=id;renderOrganise();}
function orgSetTab(tab){ORG.tab=tab;renderOrganise();}

function orgMoveToCat(from,idx,to){
  var dbLen=(DB[from]||[]).length;
  var doc;
  if(idx<dbLen){ doc=DB[from].splice(idx,1)[0]; }
  else { doc=(EXTRA[from]||[]).splice(idx-dbLen,1)[0]; }
  if(!doc) return;
  EXTRA[to]=EXTRA[to]||[];
  EXTRA[to].push(doc);
  var o=document.getElementById('moveto-overlay');if(o)o.remove();
  renderOrganise();
}

function renderPortSignalPage(){

  h += '</div></div>';

  PORT_SIGS.forEach(function(area, ai){
    var aTitle=area[0], kmRange=area[1], subTitle=area[2], sigs=area[3];

    var iCount=sigs.filter(function(s){return s[4]==='yard';}).length;
    var ctrls=[];
    sigs.forEach(function(s){if(ctrls.indexOf(s[3])<0)ctrls.push(s[3]);});
    var zid='pa'+ai;
    h += '<div class="sig-zone" id="'+zid+'">';
    h += '<div class="sig-zone-hdr" onclick="sigToggleZone(\''+zid+'\')" style="touch-action:manipulation">';

    if(iCount) h += '<span class="sig-zone-pill" style="background:#888">'+iCount+' info</span>';
    ctrls.forEach(function(c){
      var ci=PORT_CTRL[c]||{name:c,color:'#888'};
      h += '<span class="sig-zone-pill" style="background:'+ci.color+'">'+c+'</span>';
    });
    h += '</div></div>';

    h += '<button onclick="event.stopPropagation();showEditPortArea('+ai+')" class="etb-card-btn">Edit</button>';
    h += '<button onclick="event.stopPropagation();showAddPortSignal('+ai+')" class="etb-card-btn etb-card-accent">+ Signal</button>';

    sigs.forEach(function(s, si){
      var km=s[0],num=s[1],type=s[2],ctrl=s[3],cls=s[4],loc=s[5]||"",notes=s[6]||"";
      var ci=PORT_CTRL[ctrl]||{name:ctrl,color:'#888'};
      var dotColor=cls==='auto'?'#6a9a6a':cls==='yard'?'#999':'#c07a30';
      var cid='pa'+ai+'-'+si;
      var action='';
      if(cls==='auto') action='Permissive signal \u2014 may pass at STOP under ANSG 608. Proceed at restricted speed.';
      else if(cls==='yard') action=notes;
      else {
        action='Absolute signal \u2014 verbal authority from <strong>'+ci.name+'</strong>.';
        if(notes&&(notes.indexOf('confirm points')>=0||notes.indexOf('turnout')>=0)) action+=' Confirm points correctly set.';
        if(notes&&notes.indexOf('dump station')>=0) action+=' NCIG dump station controller authority also required.';

      h += '<div class="sig-card-hdr">';

      h += '<div class="sig-num">'+num+'</div>';
      if(S.editMode) h += '<button onclick="event.stopPropagation();showEditPortSignal('+ai+','+si+')" class="etb-card-btn">Edit</button>';
      h += '<span class="sig-card-arr">›</span></div>';
      h += '<div class="sig-card-body">';
      h += '<div class="sig-detail-row"><div class="sig-detail-icon"></div>';
      h += '<div><div class="sig-detail-label">Signal type</div><div class="sig-detail-val">'+(type||'Controlled')+'</div></div></div>';

function showAddDoc(catId){

  S._editSecs = [{t:'text',title:'Overview',content:'Enter content here.'}];
  document.getElementById('hdr-title').textContent = 'Add Document';
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-doc').classList.add('active');
  renderEditNew();
}

function renderEditNew(){
  var catId = S._editCat;
  var cat = getCat(catId);
  var secs = S._editSecs;
  var el = document.getElementById('page-doc');
  var h = '<div class="back-btn" onclick="showCat(\''+catId+'\')">‹ '+cat.name+'</div>';
  h += '<div class="edit-panel">';
  h += '<div style="font-size:16px;font-weight:700;margin-bottom:14px;color:var(--c-text)">Add new document</div>';
  h += '<label class="edit-label">Document name</label>';
  h += '<input class="edit-field" id="edit-name" placeholder="e.g. ANTR 432 — New Rule">';
  h += '<label class="edit-label">Source</label>';
  h += '<input class="edit-field" id="edit-src" placeholder="e.g. ARTC NSW Train Working">';
  h += '<label class="edit-label">Official PDF URL (optional)</label>';
  h += '<input class="edit-field" id="edit-url" placeholder="https://www.artc.com.au/uploads/...">';
  h += '<label class="edit-label">Type</label>';
  h += '<select class="edit-field" id="edit-type"><option value="field">Field Guide</option><option value="artc">ARTC</option><option value="route">Route</option></select>';
  h += '</div>';
  h += renderEditSections(secs);
  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px">';
  ['text','note','warn','caut','steps','table'].forEach(function(t){
    h += '<button class="edit-add-sec" onclick="editAddSec(\''+t+'\')">+ '+t+'</button>';
  });
  h += '</div>';
  h += '<button class="edit-save" onclick="saveNewDoc()" style="margin-top:12px">Add document</button>';
  h += '<button class="edit-cancel" onclick="showCat(\''+catId+'\')">Cancel</button>';
  el.innerHTML = h;
}

function saveNewDoc(){
  _readEditFields();
  var catId = S._editCat;
  var nameEl = document.getElementById('edit-name');
  var srcEl  = document.getElementById('edit-src');
  var urlEl  = document.getElementById('edit-url');
  var typeEl = document.getElementById('edit-type');
  var name = nameEl ? nameEl.value.trim() : '';
  if(!name){ alert('Please enter a document name.'); return; }
  var newDoc = {
    name: name,
    source: srcEl ? srcEl.value.trim() : '',
    type: typeEl ? typeEl.value : 'field',
    sections: S._editSecs
  };
  var url = urlEl ? urlEl.value.trim() : '';
  if(url) newDoc.url = url;
  if(!EXTRA[catId]) EXTRA[catId] = [];
  EXTRA[catId].push(newDoc);
  S._editIdx = allDocs(catId).length - 1;
  showCat(catId);
}

function saveEditCat(){
  var catId = S._editCat;
  var cat = getCat(catId);
  var nameEl  = document.getElementById('cat-name');
  var colorEl = document.getElementById('cat-color');
  if(nameEl && nameEl.value.trim()) cat.name = nameEl.value.trim();
  if(colorEl && colorEl.value.trim()){
    var c = colorEl.value.trim();
    cat.color = c;
    // Derive lighter bg and text colours
    cat.tc = c;
    cat.bg = c+'18';
    cat.sc = c;
  }
  showCat(catId);

// ── EDIT DOCUMENT (enhanced renderEdit) ─────────────────────
function renderEditSections(secs){
  var h = '';
  secs.forEach(function(sec,si){
    h += '<div class="edit-sec" id="es'+si+'">';
    h += '<div class="edit-sec-hdr">';
    h += '<span class="edit-sec-type">'+sec.t+'</span>';
    h += '<span class="edit-sec-title" style="flex:1">'+(sec.title||sec.t)+'</span>';
    if(si > 0){
      h += '<button class="org-move-btn" onclick="editMoveSec('+si+',-1)" style="margin-right:2px" title="Move up">↑</button>';
    }
    if(si < secs.length-1){
      h += '<button class="org-move-btn" onclick="editMoveSec('+si+',1)" style="margin-right:2px" title="Move down">↓</button>';
    }
    h += '<button class="edit-del" onclick="editDelSec('+si+')">×</button>';
    h += '</div>';
    if(sec.t==='text'){
      h += '<label class="edit-label">Title</label>';
      h += '<input class="edit-field" id="et'+si+'" value="'+escHtml(sec.title||'')+'">';
      h += '<label class="edit-label">Content</label>';
      h += '<textarea class="edit-textarea" id="ec'+si+'" style="min-height:100px">'+escHtml(sec.content||'')+'</textarea>';
    } else if(sec.t==='note'||sec.t==='warn'||sec.t==='caut'){
      h += '<label class="edit-label">Content</label>';
      h += '<textarea class="edit-textarea" id="ec'+si+'">'+escHtml(sec.content||'')+'</textarea>';
    } else if(sec.t==='steps'){
      h += '<label class="edit-label">Title</label>';
      h += '<input class="edit-field" id="et'+si+'" value="'+escHtml(sec.title||'')+'">';
      h += '<label class="edit-label">Steps (one per line)</label>';
      h += '<textarea class="edit-textarea" id="ec'+si+'" style="min-height:130px">'+escHtml((sec.items||[]).join('\n'))+'</textarea>';

function openPDF(url){
  if(!url) return;
  var w = window.open(url, '_blank');
  if(!w || w.closed || typeof w.closed === 'undefined'){
    // Popup blocked - try direct navigation
    var a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}

  var dir = S._sigEditDir;
  var arr = dir==='up' ? SIG_UP : SIG_DOWN;
  if(isNew){
    arr.push(entry);

  } else {
    arr[S._sigEditIdx] = entry;

  showSignals();

function portSigFilterAndOpen(sigNum){
  var ql = (sigNum||'').toLowerCase().trim();
  // Expand all port zones
  var allBodies = document.querySelectorAll('.sig-zone-body');
  var allArrs   = document.querySelectorAll('.sig-zone-arr');
  allBodies.forEach(function(b){ b.className='sig-zone-body open'; b.style.display='block'; });
  allArrs.forEach(function(a){ a.style.transform='rotate(90deg)'; });
  // Find and scroll to matching card
  setTimeout(function(){
    var cards = document.querySelectorAll('.sig-card');
    for(var i=0; i<cards.length; i++){
      var numEl = cards[i].querySelector('.sig-num');
      var kmEl  = cards[i].querySelector('.sig-km');
      var numTxt = numEl ? numEl.textContent.toLowerCase() : '';
      var kmTxt  = kmEl  ? kmEl.textContent.toLowerCase()  : '';
      if(numTxt.indexOf(ql)>=0 || kmTxt.indexOf(ql)>=0){
        cards[i].className = 'sig-card open';
        setTimeout(function(card){ card.scrollIntoView({behavior:'smooth',block:'center'}); }, 80, cards[i]);
        break;
      }
    }
  }, 150);
}</script>
